// ── MONTHLY TREND CHART ──────────────────────────────────────────────
const MonthlyTrendChart=React.memo(function MonthlyTrendChart({txs,groups,subCats=[],selMonth,selYear}){
  const [mode,setMode]=useState('monthly');     // 'monthly' | 'weekly'
  const [viewCat,setViewCat]=useState(null);    // group_id or null (total)
  const [viewSub,setViewSub]=useState(null);    // sub_category_id or null
  const [tooltip,setTooltip]=useState(null);

  // When category changes, reset sub
  const selectCat=gid=>{setViewCat(gid===viewCat?null:gid);setViewSub(null)};
  const selectSub=sid=>{setViewSub(sid===viewSub?null:sid)};

  // Sub-categories available for selected category
  const subsForCat=useMemo(()=>viewCat?subCats.filter(s=>s.group_id===viewCat):[],[subCats,viewCat]);

  // Build period data
  const buildPoint=(periodTxs)=>{
    const total=periodTxs.reduce((s,t)=>s+t.amount,0);
    const byCat={};
    periodTxs.forEach(t=>{byCat[t.group_id]=(byCat[t.group_id]||0)+t.amount});
    const bySub={};
    periodTxs.forEach(t=>{if(t.sub_category_id)bySub[t.sub_category_id]=(bySub[t.sub_category_id]||0)+t.amount});
    return{total,byCat,bySub};
  };

  const months=useMemo(()=>{
    const arr=[];
    for(let m=0;m<12;m++){
      const s=new Date(selYear,m-1,25).toISOString().split('T')[0];
      const e=new Date(selYear,m,24).toISOString().split('T')[0];
      const pt=buildPoint(txs.filter(t=>t.date>=s&&t.date<=e));
      arr.push({label:MN[m].slice(0,3),...pt});
    }
    return arr;
  },[txs,selYear]);

  const weeks=useMemo(()=>{
    const arr=[];
    const now=new Date();const dow=now.getDay();
    const curMon=new Date(now);curMon.setDate(now.getDate()+(dow===0?-6:1-dow));
    for(let w=11;w>=0;w--){
      const mon=new Date(curMon);mon.setDate(curMon.getDate()-w*7);
      const sun=new Date(mon);sun.setDate(mon.getDate()+6);
      const s=mon.toISOString().split('T')[0];
      const e=sun.toISOString().split('T')[0];
      const pt=buildPoint(txs.filter(t=>t.date>=s&&t.date<=e));
      const label=mon.toLocaleDateString('id-ID',{day:'numeric',month:'short'});
      arr.push({label,...pt});
    }
    return arr;
  },[txs]);

  const dataPoints=mode==='monthly'?months:weeks;

  const activeData=useMemo(()=>dataPoints.map(d=>{
    if(viewSub) return d.bySub[viewSub]||0;
    if(viewCat) return d.byCat[viewCat]||0;
    return d.total;
  }),[dataPoints,viewCat,viewSub]);

  const maxVal=Math.max(...activeData,1);
  const activeGroup=viewCat?groups.find(g=>g.id===viewCat):null;
  const activeSub=viewSub?subCats.find(s=>s.id===viewSub):null;
  const lineColor=activeGroup?activeGroup.color:'#c8f560';

  const W=320,H=140,padL=48,padR=12,padT=16,padB=28;
  const chartW=W-padL-padR;const chartH=H-padT-padB;
  const xStep=dataPoints.length>1?chartW/(dataPoints.length-1):chartW;

  const pts=activeData.map((v,i)=>({x:padL+i*xStep,y:padT+chartH-(v/maxVal)*chartH,v,m:dataPoints[i].label,idx:i}));
  const pathD=pts.reduce((d,p,i)=>{
    if(i===0)return`M ${p.x} ${p.y}`;
    const prev=pts[i-1];const cpx=(prev.x+p.x)/2;
    return d+` C ${cpx} ${prev.y} ${cpx} ${p.y} ${p.x} ${p.y}`;
  },'');
  const areaD=pts.length>1?pathD+` L ${pts[pts.length-1].x} ${padT+chartH} L ${pts[0].x} ${padT+chartH} Z`:'';
  const yLabels=[0,.25,.5,.75,1].map(f=>({
    y:padT+chartH-f*chartH,
    label:maxVal*f>=1000000?`${(maxVal*f/1000000).toFixed(1)}M`:maxVal*f>=1000?`${Math.round(maxVal*f/1000)}K`:'0'
  }));
  const activeIdx=mode==='monthly'?selMonth:pts.length-1;
  const maxVal2=Math.max(...activeData);
  const maxIdx=maxVal2>0?activeData.indexOf(maxVal2):-1;
  const ytd=activeData.reduce((s,v)=>s+v,0);

  // Active filter label for display
  const filterLabel=viewSub?`${activeGroup?.emoji||''} ${activeSub?.name||''}`:viewCat?`${activeGroup?.emoji||''} ${activeGroup?.name||''}`:null;

  return(
    <div className="section">
      <div className="section-label">Expenses Trend</div>
      <div className="card">
        {/* Mode toggle */}
        <div style={{display:'flex',gap:6,marginBottom:12}}>
          <div className={`chip ${mode==='monthly'?'on':''}`} onClick={()=>{setMode('monthly');setTooltip(null)}} style={{fontSize:11,padding:'5px 12px'}}>Monthly</div>
          <div className={`chip ${mode==='weekly'?'on':''}`} onClick={()=>{setMode('weekly');setTooltip(null)}} style={{fontSize:11,padding:'5px 12px'}}>Weekly</div>
          {filterLabel&&(
            <div onClick={()=>{setViewCat(null);setViewSub(null)}}
              style={{display:'inline-flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:20,fontSize:11,cursor:'pointer',
                background:'var(--abg)',border:'.5px solid var(--a)',color:'var(--a)',marginLeft:'auto'}}>
              {filterLabel} <span style={{fontSize:12}}>x</span>
            </div>
          )}
        </div>

        {/* Category pills */}
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:viewCat&&subsForCat.length>0?8:14}}>
          <div onClick={()=>{setViewCat(null);setViewSub(null)}} className={`chip ${!viewCat?'on':''}`} style={{fontSize:11,padding:'5px 10px'}}>Total</div>
          {groups.filter(g=>dataPoints.some(d=>d.byCat[g.id]>0)).map(g=>(
            <div key={g.id} onClick={()=>selectCat(g.id)}
              style={{display:'inline-flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:20,fontSize:11,cursor:'pointer',
                border:`.5px solid ${viewCat===g.id?g.color:'var(--b1)'}`,
                background:viewCat===g.id?`${g.color}18`:'var(--bg3)',
                color:viewCat===g.id?g.color:'var(--t2)',transition:'all .15s',flexShrink:0}}>
              <span>{g.emoji}</span>{g.name}
            </div>
          ))}
        </div>

        {/* Sub-category pills — only show when a category is selected and has subs */}
        {viewCat&&subsForCat.length>0&&(
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14,paddingLeft:4,borderLeft:'2px solid '+lineColor}}>
            <div onClick={()=>setViewSub(null)} className={`chip ${!viewSub?'on':''}`} style={{fontSize:10,padding:'4px 8px'}}>All subs</div>
            {subsForCat.map(s=>(
              <div key={s.id} onClick={()=>selectSub(s.id)}
                style={{display:'inline-flex',padding:'4px 8px',borderRadius:20,fontSize:10,cursor:'pointer',
                  border:`.5px solid ${viewSub===s.id?lineColor:'var(--b1)'}`,
                  background:viewSub===s.id?`${lineColor}22`:'var(--bg3)',
                  color:viewSub===s.id?lineColor:'var(--t2)',transition:'all .15s',flexShrink:0}}>
                {s.name}
              </div>
            ))}
          </div>
        )}

        {/* Chart */}
        <div style={{position:'relative'}} onMouseLeave={()=>setTooltip(null)} onTouchEnd={()=>setTimeout(()=>setTooltip(null),2000)}>
          <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block',overflow:'visible'}}>
            {yLabels.map((yl,i)=>(
              <g key={i}>
                <line x1={padL} y1={yl.y} x2={W-padR} y2={yl.y} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
                <text x={padL-4} y={yl.y+4} textAnchor="end" fontSize="8" fill="var(--t3)" fontFamily="DM Sans">{yl.label}</text>
              </g>
            ))}
            <defs>
              <linearGradient id="areaGrad2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={lineColor} stopOpacity="0.25"/>
                <stop offset="100%" stopColor={lineColor} stopOpacity="0.02"/>
              </linearGradient>
            </defs>
            {areaD&&<path d={areaD} fill="url(#areaGrad2)"/>}
            {pathD&&<path d={pathD} fill="none" stroke={lineColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
            {pts.map((p,i)=>{
              const isActive=i===activeIdx;
              const showLabel=mode==='monthly'||(i%3===0||i===pts.length-1);
              return(
                <g key={i}>
                  <rect x={xStep>0?p.x-xStep/2:p.x-10} y={padT} width={xStep>0?xStep:20} height={chartH} fill="transparent" style={{cursor:'pointer'}}
                    onMouseEnter={()=>setTooltip({x:p.x,y:p.y,label:p.m,value:p.v,idx:i})}
                    onTouchStart={()=>setTooltip({x:p.x,y:p.y,label:p.m,value:p.v,idx:i})}/>
                  {(tooltip?.idx===i||isActive)&&<circle cx={p.x} cy={p.y} r="4" fill={lineColor} stroke="var(--bg2)" strokeWidth="2"/>}
                  {showLabel&&<text x={p.x} y={H-8} textAnchor="middle" fontSize={mode==='weekly'?7:8}
                    fill={isActive?lineColor:'var(--t3)'} fontFamily="DM Sans" fontWeight={isActive?700:400}>{p.m}</text>}
                </g>
              );
            })}
          </svg>
          {tooltip&&(
            <div style={{position:'absolute',
              left:Math.min(Math.max((tooltip.x/W)*100,15),80)+'%',
              top:Math.max(0,(tooltip.y/H)*100-18)+'%',
              transform:'translateX(-50%)',
              background:'var(--bg)',border:`.5px solid ${lineColor}`,
              borderRadius:8,padding:'6px 10px',pointerEvents:'none',zIndex:10,minWidth:90,textAlign:'center'}}>
              <div style={{fontSize:10,color:'var(--t3)',marginBottom:2}}>{tooltip.label}</div>
              <div style={{fontFamily:'var(--fh)',fontSize:13,fontWeight:700,color:lineColor}}>{idr(tooltip.value)}</div>
            </div>
          )}
        </div>

        {/* Summary */}
        <div style={{display:'flex',justifyContent:'space-between',marginTop:10,paddingTop:10,borderTop:'.5px solid var(--b1)'}}>
          <div>
            <div style={{fontSize:11,color:'var(--t3)'}}>{mode==='monthly'?'Highest month':'Highest week'}</div>
            <div style={{fontFamily:'var(--fh)',fontSize:13,fontWeight:700,color:lineColor,marginTop:2}}>
              {maxIdx>=0?`${dataPoints[maxIdx].label} - ${idr(maxVal2)}`:'No data'}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11,color:'var(--t3)'}}>{mode==='monthly'?'YTD Total':'12-week Total'}</div>
            <div style={{fontFamily:'var(--fh)',fontSize:13,fontWeight:700,color:'var(--t1)',marginTop:2}}>{idr(ytd)}</div>
          </div>
        </div>
      </div>
    </div>
  );
})


// ── SPEND ANALYSIS ───────────────────────────────────────────────────
const SpendAnalysis=React.memo(function SpendAnalysis({txs,groups,budgets,subCats=[]}){
  const [selMonth,setSelMonth]=useState(new Date().getMonth());
  const [selYear]=useState(new Date().getFullYear());
  const [showRp,setShowRp]=useState(false);
  const [hovered,setHovered]=useState(null);
  const [showInsights,setShowInsights]=useState(false);

  const mTx=useMemo(()=>{
    const s=new Date(selYear,selMonth-1,25).toISOString().split('T')[0];
    const e=new Date(selYear,selMonth,24).toISOString().split('T')[0];
    return txs.filter(t=>t.date>=s&&t.date<=e);
  },[txs,selMonth,selYear]);

  const total=useMemo(()=>mTx.reduce((s,t)=>s+t.amount,0),[mTx]);

  const byG=useMemo(()=>{
    const m={};mTx.forEach(t=>{m[t.group_id]=(m[t.group_id]||0)+t.amount});return m;
  },[mTx]);

  // Slices for pie
  const slices=useMemo(()=>{
    if(!total)return[];
    let cum=0;
    return Object.entries(byG).sort((a,b)=>b[1]-a[1]).map(([gid,amt])=>{
      const g=groups.find(x=>x.id===gid);
      const pct=amt/total,angle=pct*360;
      const s={gid,amt,pct,angle,startAngle:cum,color:g?.color||'#888',name:g?.name||'Other',emoji:g?.emoji||'💰'};
      cum+=angle;return s;
    });
  },[byG,total,groups]);

  // Top 5 categories
  const top5=useMemo(()=>slices.slice(0,5),[slices]);

  // Largest transactions
  const largest=useMemo(()=>[...mTx].sort((a,b)=>b.amount-a.amount).slice(0,5),[mTx]);

  // Recurring detection - same description appears 2+ times
  const recurring=useMemo(()=>{
    const map={};
    mTx.forEach(t=>{
      const key=t.description.toLowerCase().trim();
      if(!map[key])map[key]={desc:t.description,count:0,total:0,dates:[]};
      map[key].count++;map[key].total+=t.amount;map[key].dates.push(t.date);
    });
    return Object.values(map).filter(x=>x.count>=2).sort((a,b)=>b.count-a.count);
  },[mTx]);

  const arc=(cx,cy,r,s,e)=>{
    const rad=d=>d*Math.PI/180;
    const x1=cx+r*Math.sin(rad(s)),y1=cy-r*Math.cos(rad(s));
    const x2=cx+r*Math.sin(rad(e)),y2=cy-r*Math.cos(rad(e));
    return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${e-s>180?1:0} 1 ${x2} ${y2} Z`;
  };

  const active=hovered!=null?slices[hovered]:null;

  // Previous month data
  const prevTx=useMemo(()=>{
    const s=new Date(selYear,selMonth-2,25).toISOString().split('T')[0];
    const e=new Date(selYear,selMonth-1,24).toISOString().split('T')[0];
    return txs.filter(t=>t.date>=s&&t.date<=e);
  },[txs,selMonth,selYear]);
  const prevTotal=useMemo(()=>prevTx.reduce((s,t)=>s+t.amount,0),[prevTx]);
  const coach=useMemo(()=>getFinanceCoach({txs,budgets,month:selMonth,year:selYear,prevTotal}),[txs,budgets,selMonth,selYear,prevTotal]);
  const categoryBrakes=useMemo(()=>getCategoryBrakes({txs,groups,subCats,budgets,month:selMonth,year:selYear}),[txs,groups,subCats,budgets,selMonth,selYear]);

  // 3-month history for trend detection
  const prev2Tx=useMemo(()=>{
    const s=new Date(selYear,selMonth-3,25).toISOString().split('T')[0];
    const e=new Date(selYear,selMonth-2,24).toISOString().split('T')[0];
    return txs.filter(t=>t.date>=s&&t.date<=e);
  },[txs,selMonth,selYear]);
  const prev2Total=useMemo(()=>prev2Tx.reduce((s,t)=>s+t.amount,0),[prev2Tx]);

  const insights=useMemo(()=>{
    if(!mTx.length||!total)return[];
    const list=[];
    const totalBudget=budgets.filter(b=>b.type==='monthly').reduce((s,b)=>s+b.amount,0);

    // ── #1 MoM ───────────────────────────────────────────────────────
    {
      const prevMonthName=MN[(selMonth-1+12)%12];
      const rising3=prev2Total>0&&prevTotal>prev2Total&&total>prevTotal;
      const prevByCat={};prevTx.forEach(t=>{prevByCat[t.group_id]=(prevByCat[t.group_id]||0)+t.amount});
      const bigShiftCat=groups.find(g=>{
        const prev=prevByCat[g.id]||0;const cur=byG[g.id]||0;
        return prev>0&&cur>0&&Math.abs((cur-prev)/prev)>0.3&&cur!==prev;
      });
      const anyOver=groups.some(g=>{const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');return b&&(byG[g.id]||0)>b.amount});
      const ytdMonths=[];
      for(let m=0;m<selMonth;m++){
        const s=new Date(selYear,m-1,25).toISOString().split('T')[0];
        const e=new Date(selYear,m,24).toISOString().split('T')[0];
        ytdMonths.push(txs.filter(t=>t.date>=s&&t.date<=e).reduce((s,t)=>s+t.amount,0));
      }
      const isWorstMonth=ytdMonths.length>0&&total>Math.max(...ytdMonths,0);
      const isBestMonth=ytdMonths.length>0&&total<Math.min(...ytdMonths.filter(v=>v>0),Infinity);
      const isPeriodOngoing=new Date()<new Date(selYear,selMonth,24);

      if(prevTotal>0){
        const diff=total-prevTotal;const pct=Math.abs((diff/prevTotal)*100);const absDiff=Math.abs(diff);
        let text,action;
        if(diff>0){
          text=`Pengeluaran naik ${pct.toFixed(0)}% vs ${prevMonthName} (${idr(prevTotal)}). Selisih +${idr(diff)}.`;
          if(rising3) action=`Pengeluaran naik 3 bulan berurutan. Udah 3 bulan naik terus. Coba pilih 1 kategori dan stop total bulan depan — kecil kelihatannya tapi Rp 200K/bulan itu Rp 2.4jt setahun lho.`;
          else if(anyOver) action=`Double trouble: naik MoM dan over budget. Audit semua kategori dan potong 1 yang paling tidak esensial.`;
          else if(isWorstMonth) action=`Ini pengeluaran tertinggi tahun ini. Analisis: one-time expense atau habit baru? Siapkan contingency budget.`;
          else if(pct<5) action=`Naik tipis — masih terkontrol. Naik tipis — belum bahaya, tapi kalau dibiarkan bisa jadi kebiasaan. Coba cek 1 pengeluaran yang sebenernya bisa dihindari.`;
          else if(pct<15) action=`Identifikasi 1 kategori yang naik paling banyak dan set batas maksimalnya bulan depan.`;
          else if(pct<30) action=`Cek apakah ada one-time expense yang wajar, atau ada kebiasaan baru yang perlu dikontrol.`;
          else if(pct<50) action=`Pengeluaran naik signifikan. Review semua transaksi >Rp 100K dan evaluasi yang bisa dihilangkan.`;
          else action=`Pengeluaran melonjak drastis. Serius nih, coba freeze dulu semua yang tidak urgent minggu ini — kasih nafas ke dompet.`;
          if(totalBudget>0&&total<totalBudget) action=`Naik X% tapi masih dalam total budget — aman. Naik dikit sih, tapi masih aman. Daripada sisa budget dihabisin di akhir bulan, langsung pindahin ke tabungan aja.`;
          const naik1Cat=groups.find(g=>{const prev=prevByCat[g.id]||0;const cur=byG[g.id]||0;return(cur-prev)/(diff||1)>0.85&&diff>0});
          if(naik1Cat) action=`Kenaikan hampir 100% berasal dari ${naik1Cat.name}. Solving ini saja sudah cukup untuk balik ke angka ${prevMonthName}.`;
          list.push({icon:'📈',text,action});
        } else if(diff<0){
          text=`Pengeluaran turun ${pct.toFixed(0)}% vs ${prevMonthName} (${idr(prevTotal)}). Hemat ${idr(absDiff)}!`;
          if(isBestMonth) action=`Ini pengeluaran terendah sepanjang tahun ini! Catat apa yang berbeda dan replikasi bulan depan.`;
          else if(anyOver&&pct>0) action=`Total turun tapi ada kategori over budget. Fokus selesaikan yang jebol dulu.`;
          else if(bigShiftCat){
            const cur=byG[bigShiftCat.id]||0;const prev=prevByCat[bigShiftCat.id]||0;
            const dir=cur>prev?'naik':'turun';
            action=`Total ${dir==='turun'?'turun':'naik'} tapi ${bigShiftCat.name} ${dir} — ada pergeseran pattern. Monitor ketat bulan depan.`;
          }
          else if(pct>30) action=`Penghematan luar biasa ${idr(absDiff)}! Ini bagus banget! Jadiin angka bulan ini sebagai patokan — bulan depan coba pertahanin atau lebih rendah lagi.`;
          else if(pct>15) action=`Penghematan solid! Investasikan selisih ${idr(absDiff)} ke dana darurat atau instrumen investasi.`;
          else if(!anyOver) action=`Perfect pace! Coba challenge diri turunkan lagi 10% bulan depan.`;
          else action=`Progress bagus! Alokasikan selisih ${idr(absDiff)} ke tabungan bulan depan.`;
          list.push({icon:'📉',text,action});
        } else {
          const action2=bigShiftCat?`Meski total sama, ada pergeseran di ${bigShiftCat.name}. Pastikan sesuai prioritas keuangan.`:`Konsistensi spending 2 bulan berturut. Saatnya mulai optimalkan, bukan hanya maintain.`;
          list.push({icon:'📊',text:`Pengeluaran hampir identik dengan ${prevMonthName} (selisih <5%) — sangat konsisten.`,action:action2});
        }
        if(isPeriodOngoing){
          const daysLeft=Math.ceil((new Date(selYear,selMonth,24)-new Date())/(1000*60*60*24));
          const pace=Math.round(total/(30-daysLeft)*daysLeft);
          list[list.length-1].text+=(diff>0?` Estimasi akhir period: ${idr(total+pace)}.`:'');
        }
      } else {
        list.push({icon:'📊',text:`Perbandingan MoM pertama kamu — baseline mulai terbentuk.`,action:`Data 2 bulan sudah cukup untuk set target. Coba turunkan total 10% bulan depan sebagai tantangan pertama.`});
      }
    }

    // ── #2 Budget Check ───────────────────────────────────────────────
    if(budgets.length>0){
      const overCats=groups.filter(g=>{const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');return b&&(byG[g.id]||0)>b.amount});
      const nearCats=groups.filter(g=>{const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');if(!b)return false;const p=(byG[g.id]||0)/b.amount;return p>=0.8&&p<1});
      const zeroCats=groups.filter(g=>{const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');return b&&!(byG[g.id])});
      const unusedCats=groups.filter(g=>{const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');return b&&(byG[g.id]||0)/b.amount<0.5});
      const totalOver=overCats.reduce((s,g)=>{const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');return s+((byG[g.id]||0)-b.amount)},0);
      const prevByCat={};prevTx.forEach(t=>{prevByCat[t.group_id]=(prevByCat[t.group_id]||0)+t.amount});
      const repeatOver=overCats.find(g=>{const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');return b&&(prevByCat[g.id]||0)>b.amount});
      const unassigned=mTx.filter(t=>!groups.find(g=>g.id===t.group_id&&budgets.find(b=>b.group_id===g.id))).reduce((s,t)=>s+t.amount,0);
      const tightCats=groups.filter(g=>{const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');return b&&(byG[g.id]||0)/b.amount>=0.95&&(byG[g.id]||0)/b.amount<1});

      if(repeatOver){
        const b=budgets.find(x=>x.group_id===repeatOver.id&&x.type==='monthly');
        list.push({icon:'🚨',text:`${repeatOver.emoji} ${repeatOver.name} over budget lagi — pola berulang 2 bulan berturut.`,action:`Budget terlalu rendah atau spending terlalu tinggi. Udah 2 bulan jebol di tempat yang sama. Mungkin budgetnya memang perlu dinaikin, atau coba sistem cash envelope buat ${repeatOver.name}.`});
      } else if(overCats.length>=3){
        list.push({icon:'🚨',text:`${overCats.length} kategori over budget sekaligus (total lebih ${idr(totalOver)}).`,action:`Banyak kategori over — mungkin angka budgetnya perlu direview — bukan berarti gagal, tapi memang perlu disesuaikan sama kenyataan.`});
      } else if(overCats.length===2){
        list.push({icon:'🚨',text:`${overCats.map(g=>g.emoji+' '+g.name).join(' & ')} melebihi budget (total over ${idr(totalOver)}).`,action:`2 kategori sekaligus over. Prioritaskan mana yang lebih esensial dan potong yang lain sampai period reset.`});
      } else if(overCats.length===1){
        const g=overCats[0];const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');
        const overPct=Math.round(((byG[g.id]||0)/b.amount-1)*100);
        const domOver=totalOver>0&&totalOver/(total*0.1)>0.6;
        const action=domOver?`${g.name} jadi sumber hampir semua overspending. Solving ini = solving mayoritas masalah budget.`:overPct<10?`Hampir on budget! Kurangi 1-2 tx kecil di ${g.name} bulan depan untuk kembali ke target.`:`${g.name} jebol ${overPct}%. Udah cukup untuk kategori ini bulan ini. Tahan dulu sampai period baru mulai ya.`;
        list.push({icon:'🚨',text:`${g.emoji} ${g.name} over budget ${overPct}% (${idr(byG[g.id]||0)} dari ${idr(b.amount)}).`,action});
      } else if(tightCats.length>0){
        const g=tightCats[0];const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');
        const sisa=b.amount-(byG[g.id]||0);
        list.push({icon:'⚠️',text:`${g.emoji} ${g.name} nyaris habis — sudah ${Math.round((byG[g.id]||0)/b.amount*100)}% dari budget (sisa ${idr(sisa)}).`,action:`Estimasi sisa hari dan hitung maks pengeluaran harian agar tidak jebol di menit-menit terakhir.`});
      } else if(nearCats.length>0){
        const g=nearCats[0];const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');
        const sisa=b.amount-(byG[g.id]||0);const sisPct=Math.round((sisa/b.amount)*100);
        list.push({icon:'⚠️',text:`${g.emoji} ${g.name} sudah ${100-sisPct}% dari budget (sisa ${idr(sisa)}).`,action:`Sisa ${idr(sisa)} untuk ${g.name}. Tahan pengeluaran non-esensial sampai period berakhir.`});
      } else if(unusedCats.length===budgets.length&&unusedCats.length>0){
        list.push({icon:'✅',text:`Semua kategori masih sangat aman (<50% budget terpakai).`,action:`Budget sangat longgar. Coba challenge turunkan budget 10-15% bulan depan dan alihkan selisih ke tabungan.`});
      } else if(unassigned>total*0.1){
        list.push({icon:'⚠️',text:`${idr(Math.round(unassigned))} keluar dari kategori tanpa budget — tidak terpantau.`,action:`Set budget untuk semua kategori aktif agar setiap rupiah bisa dipantau dan dikontrol.`});
      } else if(zeroCats.length>0){
        list.push({icon:'✅',text:`Semua budget terkontrol. ${zeroCats.map(g=>g.name).join(', ')} belum ada spending.`,action:`Ada kategori dengan 0 spending — budget-nya bisa dialihkan sementara ke kategori yang lebih aktif.`});
      } else {
        const action=overCats.length===0&&nearCats.length===0?`Spending terkontrol sempurna! Pertahankan dan alokasikan sisa budget akhir period ke tabungan.`:`On track! Jangan tergoda menghabiskan sisa budget di akhir period.`;
        list.push({icon:'✅',text:`Semua kategori dalam batas budget — great financial discipline!`,action});
      }
    }

    // ── #3 Recurring ─────────────────────────────────────────────────
    if(recurring.length>0){
      // Sort by total amount (highest value recurring = most impactful)
      const sorted=[...recurring].sort((a,b)=>b.total-a.total);
      const top=sorted[0];
      const recurringTotal=recurring.reduce((s,r)=>s+r.total,0);
      const recurPct=Math.round((recurringTotal/total)*100);
      const avgPerOccur=Math.round(top.total/top.count);
      const projYear=top.total*12;
      const topPctOfRecur=Math.round(top.total/recurringTotal*100);
      const topPctOfTotal=Math.round(top.total/total*100);
      // Prev month recurring map (by desc)
      const prevRecurring={};
      prevTx.forEach(t=>{const key=t.description.toLowerCase().trim();if(!prevRecurring[key])prevRecurring[key]={count:0,total:0};prevRecurring[key].count++;prevRecurring[key].total+=t.amount;});
      const isNewThisMonth=!prevRecurring[top.desc.toLowerCase().trim()]||prevRecurring[top.desc.toLowerCase().trim()].count<2;
      const prevTopEntry=prevRecurring[top.desc.toLowerCase().trim()];
      const topGrew=prevTopEntry&&prevTopEntry.count>=2&&top.total>prevTopEntry.total;
      const topGrowPct=prevTopEntry&&prevTopEntry.total>0?Math.round(((top.total-prevTopEntry.total)/prevTopEntry.total)*100):0;
      const goneRecurring=Object.entries(prevRecurring).filter(([k,v])=>v.count>=2&&!recurring.find(r=>r.desc.toLowerCase().trim()===k));
      const biggestGone=goneRecurring.sort((a,b)=>b[1].total-a[1].total)[0];

      // text: always lead with total value, not count
      const text=`"${top.desc}" paling besar: ${idr(top.total)} (${top.count}x bulan ini).`;
      let action;

      // Case 1: Top recurring > 30% of total spending — single item dominates
      if(topPctOfTotal>=30){
        action=`"${top.desc}" menyedot ${topPctOfTotal}% dari total pengeluaran bulan ini sendirian. Kalau ini bisa dipangkas setengahnya, langsung hemat ${idr(Math.round(top.total*0.5))}/bulan.`;
      }
      // Case 2: High frequency (4x+) AND high total — double danger
      else if(top.count>=4&&top.total>total*0.15){
        action=`"${top.desc}" muncul ${top.count}x dengan total ${idr(top.total)} — frekuensi tinggi sekaligus nilainya gede. Kalau dikurangi jadi 2x/bulan aja, hemat ${idr(top.total-avgPerOccur*2)}/bulan.`;
      }
      // Case 3: Brand new recurring this month with big total
      else if(isNewThisMonth&&top.total>total*0.1){
        action=`"${top.desc}" adalah pengeluaran berulang baru bulan ini — langsung masuk ${idr(top.total)}. Pastikan ini memang direncanakan, bukan tiba-tiba jadi kebiasaan.`;
      }
      // Case 4: Top recurring grew significantly vs last month
      else if(topGrew&&topGrowPct>=30){
        action=`"${top.desc}" naik ${topGrowPct}% vs bulan lalu (${idr(prevTopEntry.total)} → ${idr(top.total)}). Cek apa yang berubah — frekuensi bertambah atau harganya naik?`;
      }
      // Case 5: Recurring total dominates overall spending
      else if(recurPct>=50){
        const topNames=sorted.slice(0,3).map(r=>`"${r.desc}"`).join(', ');
        action=`${recurPct}% pengeluaran bulan ini dari item berulang: ${topNames}. Audit satu-satu — mana yang bisa dikurangi atau dihapus sama sekali.`;
      }
      // Case 6: Successfully stopped a big recurring from last month
      else if(biggestGone&&biggestGone[1].total>50000){
        action=`"${top.desc}" masih jalan, tapi kamu berhasil stop "${biggestGone[0]}" yang bulan lalu ${idr(biggestGone[1].total)}. Kalau hemat itu konsisten, setahun bisa nyimpan ${idr(biggestGone[1].total*12)}.`;
      }
      // Case 7: Small per-transaction but accumulates big
      else if(avgPerOccur<=75000&&top.count>=3){
        action=`"${top.desc}" kelihatannya kecil per transaksi (${idr(avgPerOccur)}), tapi ${top.count}x/bulan = ${idr(top.total)}. Kalau terus setahun bisa ${idr(projYear)} — worth it?`;
      }
      // Case 8: Fallback — project to annual
      else{
        action=`"${top.desc}" total ${idr(top.total)} bulan ini. Kalau rutin tiap bulan, setahun bisa ${idr(projYear)} — cek apakah bisa ditekan atau dicari yang lebih murah.`;
      }
      list.push({icon:'🔄',text,action});
    } else {
      if(prevTx.length>0&&Object.keys((() => {const m={};prevTx.forEach(t=>{const k=t.description.toLowerCase().trim();m[k]=(m[k]||0)+1});return m})()).filter(k=>Object.assign({},(() => {const m={};prevTx.forEach(t=>{const k=t.description.toLowerCase().trim();m[k]=(m[k]||0)+1});return m})())[k]>=2).length>0){
        list.push({icon:'🔄',text:`Tidak ada pengeluaran berulang bulan ini — lebih bervariasi dari bulan lalu.`,action:`Variasi spending ini bagus untuk fleksibilitas. Tapi coba set beberapa fixed expense agar budgeting lebih mudah diprediksi.`});
      }
    }

    // ── #4 Spending Pattern ───────────────────────────────────────────
    if(mTx.length>=3){
      const DAY=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
      const dayCounts={};const dayTotals={};
      mTx.forEach(t=>{const d=new Date(t.date).getDay();dayCounts[d]=(dayCounts[d]||0)+1;dayTotals[d]=(dayTotals[d]||0)+t.amount});
      const weekendCount=(dayCounts[0]||0)+(dayCounts[6]||0);
      const weekendTotal=(dayTotals[0]||0)+(dayTotals[6]||0);
      const satTotal=dayTotals[6]||0;const sunTotal=dayTotals[0]||0;
      const satCount=dayCounts[6]||0;const sunCount=dayCounts[0]||0;
      const weekendPct=Math.round((weekendCount/mTx.length)*100);
      const peakDay=Object.entries(dayCounts).sort((a,b)=>b[1]-a[1])[0];
      const peakDayIdx=parseInt(peakDay[0]);
      const peakDayName=DAY[peakDayIdx];
      const avgWkend=weekendCount>0?Math.round(weekendTotal/Math.ceil(weekendCount/2)):0;
      const zeroWeekendDays=(satCount===0?1:0)+(sunCount===0?1:0);
      const activeDaysPerWeek=Object.keys(dayCounts).length;
      const midweekHigh=(dayCounts[3]||0)+(dayCounts[4]||0)>(dayCounts[1]||0)+(dayCounts[5]||0);
      // Check prev month pattern
      const prevDayCounts={};prevTx.forEach(t=>{const d=new Date(t.date).getDay();prevDayCounts[d]=(prevDayCounts[d]||0)+1});
      const prevPeakDay=Object.entries(prevDayCounts).sort((a,b)=>b[1]-a[1])[0];
      const patternShifted=prevPeakDay&&parseInt(prevPeakDay[0])!==peakDayIdx;
      // Check spending spike after likely paydate (around 25th)
      const postPayTx=mTx.filter(t=>new Date(t.date).getDate()>=25&&new Date(t.date).getDate()<=27);
      const postPaySpike=postPayTx.length>=3;
      let text,action;
      if(zeroWeekendDays===2){text=`Nol spending di weekend bulan ini — disiplin luar biasa!`;action=`Weekend spending terkontrol sempurna. Pertahankan! Tapi tetap sisain sedikit buat senang-senang — terlalu ketat juga bisa bikin balas dendam belanja nantinya.`;}
      else if(weekendPct>60){text=`Weekend spender berat: ${weekendPct}% transaksi di Sabtu-Minggu (${idr(weekendTotal)}).`;action=`Buat 'weekend cash envelope' ${idr(avgWkend)}/weekend — habis ya habis, tidak boleh tambah.`;}
      else if(satTotal>sunTotal*1.5&&weekendPct>=30){text=`Dari weekend spending, Sabtu X% lebih boros dari Minggu (${idr(satTotal)} vs ${idr(sunTotal)}).`.replace('X%',Math.round((satTotal/sunTotal-1)*100)+'%');action=`Sabtu paling rentan impulse buying. Sabtu tuh paling gampang kalap. Bikin list dulu sebelum keluar rumah, dan stick to it.`;}
      else if(weekendPct>=40){text=`Cenderung belanja di weekend (${weekendPct}% transaksi, total ${idr(weekendTotal)}).`;action=`Siapkan to-do list belanja sebelum Sabtu agar tidak impulsif saat sudah di toko.`;}
      else if(weekendPct>=30){text=`Weekend spending moderat (${weekendPct}%).`;action=`Coba batasi outing weekend jadi 1x per minggu untuk kurangi peluang impulse buying.`;}
      else if(postPaySpike){text=`Pengeluaran melonjak tepat setelah tanggal gajian — efek gajian sangat terasa.`;action=`Gajian masuk, langsung sisihkan dulu sebelum sempat kepake. Kalau nunggu sisa akhir bulan, biasanya tidak ada sisanya.`;}
      else if(midweekHigh){text=`Rabu-Kamis jadi titik pengeluaran tinggi — classic mid-week restlessness.`;action=`Siapkan snack atau aktivitas dari rumah untuk Rabu-Kamis agar tidak jajan karena bosan.`;}
      else if(peakDayIdx===1){text=`Senin jadi hari dengan transaksi terbanyak: ${peakDay[1]}x (${idr(dayTotals[1]||0)}).`;action=`Senin sering boros — weekend hangover effect. Set hard limit dan siapin kebutuhan dari Minggu malam biar tidak perlu banyak keluar Senin-Selasa.`;}
      else if(peakDayIdx===5){text=`Jumat adalah hari paling boros: ${peakDay[1]} transaksi (${idr(dayTotals[5]||0)}).`;action=`TGIF effect itu nyata — otak seneng duluan karena weekend. Coba tunda keputusan beli ke Sabtu pagi, biasanya lebih jernih.`;}
      else if(peakDayIdx===0){text=`Minggu jadi hari pengeluaran tertinggi — kemungkinan grocery atau meal prep.`;action=`Pola Minggu sehat untuk grocery. Buat shopping list ketat agar tidak over-buy karena lapar.`;}
      else if(activeDaysPerWeek<=3){text=`Rata-rata belanja hanya ${activeDaysPerWeek} hari/minggu — frekuensi sangat rendah.`;action=`Frekuensi rendah bagus untuk kontrol! Manfaatkan hari lainnya sebagai no spend day resmi.`;}
      else if(patternShifted){text=`Hari paling boros bergeser dari ${DAY[parseInt(prevPeakDay[0])]} ke ${peakDayName} vs bulan lalu.`;action=`Pergeseran pattern bisa jadi lifestyle change. Pastikan budget mencerminkan kebiasaan terbaru.`;}
      else{text=`${peakDayName} jadi hari dengan transaksi terbanyak: ${peakDay[1]}x (${idr(dayTotals[peakDayIdx]||0)}).`;action=`Karena sudah terprediksi, set reminder sehari sebelumnya. Putuskan dulu apa yang mau dibeli sebelum hari-H, bukan pas udah di tempat.`;}
      list.push({icon:'🗓️',text,action});
    }

    // ── #5 Peak Spending Week ─────────────────────────────────────────
    if(mTx.length>=4){
      const weekMap={};
      mTx.forEach(t=>{
        const d=new Date(t.date);const day=d.getDay();
        const diffToMon=day===0?-6:1-day;
        const mon=new Date(d);mon.setDate(d.getDate()+diffToMon);
        const wkKey=mon.toISOString().split('T')[0];
        if(!weekMap[wkKey])weekMap[wkKey]={key:wkKey,count:0,total:0,mon:new Date(mon)};
        weekMap[wkKey].count++;weekMap[wkKey].total+=t.amount;
      });
      const weeks=Object.values(weekMap).sort((a,b)=>b.total-a.total);
      if(weeks.length>0){
        const peak=weeks[0];
        const sun=new Date(peak.mon);sun.setDate(peak.mon.getDate()+6);
        const fmt=d=>d.toLocaleDateString('id-ID',{day:'numeric',month:'short'});
        const pct=Math.round((peak.total/total)*100);
        const avgWk=Math.round(total/weeks.length);
        const overshoot=peak.total-avgWk;
        let action;
        if(pct>50) action=`Lebih dari setengah pengeluaran habis di 1 minggu! Pisahkan cash ${idr(avgWk)}/minggu di awal periode biar lebih terkontrol.`;
        else if(pct>40&&peak.count>=7) action=`Frekuensi tinggi (${peak.count} transaksi). Coba kurangi jadi maks 4x/minggu untuk latih disiplin.`;
        else if(pct>40&&overshoot>100000) action=`Minggu ini over rata-rata ${idr(overshoot)}. Identify 1-2 transaksi terbesar di minggu itu dan evaluasi apakah bisa dihindari.`;
        else if(pct>40) action=`Set "weekly spending limit" ${idr(avgWk)} dan track setiap Senin pagi berapa yang sudah keluar.`;
        else if(weeks.length>=3&&peak.total>weeks[weeks.length-1].total*1.5) action=`Gap besar antara minggu boros vs hemat. Ratakan dengan alokasi ${idr(avgWk)}/minggu.`;
        else action=null;
        list.push({icon:'📆',text:`Minggu ${fmt(peak.mon)}-${fmt(sun)} adalah minggu paling boros: ${peak.count} transaksi, total ${idr(peak.total)} (${pct}% dari periode ini).`,action});
      }
    }

    // ── #6 Spending Acceleration ──────────────────────────────────────
    if(mTx.length>=4){
      const periodStart=new Date(selYear,selMonth-1,25);
      const midPoint=new Date(periodStart);midPoint.setDate(periodStart.getDate()+15);
      const midStr=midPoint.toISOString().split('T')[0];
      const startStr=periodStart.toISOString().split('T')[0];
      const endStr=new Date(selYear,selMonth,24).toISOString().split('T')[0];
      const firstHalf=mTx.filter(t=>t.date>=startStr&&t.date<midStr).reduce((s,t)=>s+t.amount,0);
      const secondHalf=mTx.filter(t=>t.date>=midStr&&t.date<=endStr).reduce((s,t)=>s+t.amount,0);
      // Check prev month pattern
      const prevFirst=prevTx.filter(t=>{const d=new Date(t.date).getDate();return d>=25||d<=9}).reduce((s,t)=>s+t.amount,0);
      const prevSecond=prevTx.filter(t=>{const d=new Date(t.date).getDate();return d>=10&&d<=24}).reduce((s,t)=>s+t.amount,0);
      const prevAlsoAccel=prevFirst>0&&prevSecond>prevFirst*1.2;
      // Last 3 days spike
      const last3Days=mTx.filter(t=>{const d=new Date(t.date);return d>=new Date(new Date(selYear,selMonth,24).getTime()-3*86400000)}).reduce((s,t)=>s+t.amount,0);
      const last3Pct=secondHalf>0?Math.round((last3Days/secondHalf)*100):0;
      // Zero spending days in second half
      const zeroSecond=new Set(secondHalf>0?mTx.filter(t=>t.date>=midStr&&t.date<=endStr).map(t=>t.date):['x']).size;
      const secondHalfDays=Math.ceil((new Date(endStr)-new Date(midStr))/86400000);
      const hasZeroDaysSecond=zeroSecond<secondHalfDays*0.5;
      // Cat driving accel
      const firstByCat={};const secondByCat={};
      mTx.filter(t=>t.date>=startStr&&t.date<midStr).forEach(t=>{firstByCat[t.group_id]=(firstByCat[t.group_id]||0)+t.amount});
      mTx.filter(t=>t.date>=midStr&&t.date<=endStr).forEach(t=>{secondByCat[t.group_id]=(secondByCat[t.group_id]||0)+t.amount});
      const accelCat=groups.find(g=>{const f=firstByCat[g.id]||0;const s=secondByCat[g.id]||0;return f>0&&s>f*1.5&&(s-f)/(secondHalf-firstHalf||1)>0.5});

      if(firstHalf>0&&secondHalf>0){
        const diff=secondHalf-firstHalf;const diffPct=Math.abs(Math.round((diff/firstHalf)*100));
        let text,action,icon;
        if(diff>0&&diffPct>=20){
          icon='🚀';text=`Spending accelerating! 15 hari kedua (${idr(secondHalf)}) lebih boros ${diffPct}% dari 15 hari pertama (${idr(firstHalf)}).`;
          if(prevAlsoAccel) action=`Pola ini sama dengan bulan lalu — sistemik. Ini udah 2 bulan sama polanya. Coba otomatisin transfer ke tabungan di tanggal 10 — kalau tidak kelihatan, tidak kepake.`;
          else if(last3Pct>40) action=`Lonjakan terjadi di 3 hari terakhir saja — last-minute spending. Set 'spending freeze' 3 hari sebelum period berakhir.`;
          else if(accelCat) action=`Akselerasi hanya dari ${accelCat.name} — kategori lain stabil. Pasang hard cap harian untuk ${accelCat.name} di sisa period.`;
          else if(diffPct>60) action=`Pengeluaran meledak di akhir period. Transfer sisa budget ke rekening terpisah di tanggal 10 agar tidak tergoda.`;
          else if(diffPct>40) action=`Spending naik di paruh kedua. Set reminder di HP tiap tanggal 10 dan 20 untuk cek progress budget — 5 menit doang tapi impact-nya besar.`;
          else action=`Ada kecenderungan boros di akhir period. Coba buat weekly micro-budget untuk 2 minggu terakhir.`;
          list.push({icon,text,action});
        } else if(diff<0&&diffPct>=20){
          icon='📉';text=`Good control! 15 hari kedua (${idr(secondHalf)}) lebih hemat ${diffPct}% dari 15 hari pertama (${idr(firstHalf)}).`;
          action=hasZeroDaysSecond?`Paruh kedua hemat karena ada zero spending days. Jadikan minimal 2 hari/minggu sebagai 'no spend day' rutin.`:diffPct>40?`Kontrol bagus di paruh kedua! Terapkan strategi yang sama dari awal period bulan depan.`:`Spending melambat di akhir period — bagus! Pertahankan momentum ini.`;
          list.push({icon,text,action});
        } else if(firstHalf>secondHalf*1.5){
          list.push({icon:'⚡',text:`Front-loaded spending: 15 hari pertama (${idr(firstHalf)}) jauh lebih besar dari kedua (${idr(secondHalf)}).`,action:firstHalf/total>0.7?`Hampir semua keluar di awal — efek gajian kuat. Gajian masuk, langsung transfer sebagian ke rekening terpisah sebelum sempat kepake. Out of sight, out of mind.`:`Boros di awal tapi berhasil rem di paruh kedua — self-correction bagus! Terapkan kontrol yang sama sejak awal.`});
        } else {
          list.push({icon:'⚖️',text:`Distribusi spending sangat seimbang antara 2 paruh period (${idr(firstHalf)} vs ${idr(secondHalf)}).`,action:`Konsistensi luar biasa! Ini tanda financial discipline yang matang. Coba alokasikan sisa flat ini ke investasi rutin.`});
        }
      }
    }

    // ── #7 Small vs Big ───────────────────────────────────────────────
    if(mTx.length>=3){
      const avgAmt=Math.round(total/mTx.length);
      const smallTx=mTx.filter(t=>t.amount<avgAmt);
      const bigTx=mTx.filter(t=>t.amount>=avgAmt*2);
      const microTx=mTx.filter(t=>t.amount<20000);
      const roundTx=mTx.filter(t=>t.amount%50000===0||t.amount%100000===0||t.amount%200000===0);
      const smallTotal=smallTx.reduce((s,t)=>s+t.amount,0);
      const bigTotal=bigTx.reduce((s,t)=>s+t.amount,0);
      const smallPct=Math.round((smallTx.length/mTx.length)*100);
      const bigPct=bigTotal>0?Math.round((bigTotal/total)*100):0;
      const roundPct=Math.round((roundTx.length/mTx.length)*100);
      const prevAvgAmt=prevTx.length>0?Math.round(prevTotal/prevTx.length):0;
      const avgNaik=prevAvgAmt>0&&avgAmt>prevAvgAmt;
      const freqNaik=prevTx.length>0&&mTx.length>prevTx.length;
      // Big tx concentration
      const bigCatMap={};bigTx.forEach(t=>{bigCatMap[t.group_id]=(bigCatMap[t.group_id]||0)+1});
      const bigCatConc=Object.entries(bigCatMap).sort((a,b)=>b[1]-a[1])[0];
      const bigCatConcGroup=bigCatConc?groups.find(g=>g.id===bigCatConc[0]):null;
      const bigCatConcPct=bigCatConc&&bigTx.length>0?Math.round((bigCatConc[1]/bigTx.length)*100):0;
      // Big tx at start of period
      const periodStart25=new Date(selYear,selMonth-1,25).toISOString().split('T')[0];
      const periodEnd7=new Date(selYear,selMonth-1,31).toISOString().split('T')[0];
      const bigTxEarly=bigTx.filter(t=>t.date>=periodStart25&&t.date<=periodEnd7);
      const earlyBigPct=bigTx.length>0?Math.round((bigTxEarly.length/bigTx.length)*100):0;
      // Small tx getting smaller
      const prevSmall=prevTx.filter(t=>t.amount<(prevAvgAmt||avgAmt));
      const prevSmallAvg=prevSmall.length>0?Math.round(prevSmall.reduce((s,t)=>s+t.amount,0)/prevSmall.length):0;
      const curSmallAvg=smallTx.length>0?Math.round(smallTotal/smallTx.length):0;
      const microIncreasing=prevSmallAvg>0&&curSmallAvg<prevSmallAvg*0.8;

      let icon,text,action;
      if(roundPct>60){
        icon='🪙';text=`${roundPct}% transaksi di angka bulat (50K, 100K, 200K) — indikasi pembelian tanpa riset harga.`;
        action=`Harga 'pas banget' sering tanda tidak riset alternatif. Cek 1 opsi lain sebelum bayar untuk setiap pembelian di atas Rp 100K.`;
      } else if(smallPct>80&&microTx.length>mTx.length*0.3){
        icon='🪙';text=`Banyak micro-spending (<Rp 20K): ${microTx.length} transaksi menumpuk jadi ${idr(microTx.reduce((s,t)=>s+t.amount,0))}.`;
        action=`Micro-spending susah ditrack tapi menumpuk. Set minimum spend Rp 25K per transaksi untuk kurangi noise di spending report.`;
      } else if(smallPct>80){
        icon='🪙';text=`Banyak transaksi kecil: ${smallTx.length} dari ${mTx.length} tx di bawah ${idr(avgAmt)}, total ${idr(smallTotal)}.`;
        action=`Konsolidasikan belanja jadi minimum ${idr(Math.round(avgAmt*0.8))} per trip untuk kurangi frekuensi dan impulse spending.`;
      } else if(smallPct>70&&freqNaik&&avgNaik===false){
        icon='🪙';text=`Transaksi makin kecil-kecil tapi makin sering — death by a thousand cuts.`;
        action=`Kurangi frekuensi dulu — target maks ${Math.round(mTx.length/4)} transaksi/minggu dengan coba batching belanja.`;
      } else if(avgNaik&&freqNaik){
        icon='🐋';text=`Baik nilai per transaksi (${idr(avgAmt)} vs ${idr(prevAvgAmt)}) maupun frekuensi naik vs bulan lalu — spending naik di semua lini.`;
        action=`Naik di mana-mana sekaligus nih. Coba 1 minggu spending diet — cuma yang benar-benar perlu dulu, sisanya tahan. Reset dulu mindset-nya.`;
      } else if(bigTx.length===1&&bigPct>20){
        icon='🐋';text=`Ada 1 transaksi besar (${idr(bigTx[0].amount)}) menyumbang ${bigPct}% dari total spending.`;
        action=`Untuk pembelian sebesar ini, selalu bandingkan 3 harga dulu. 1 keputusan besar = impact sama dengan puluhan keputusan kecil.`;
      } else if(bigTx.length>1&&bigPct>50&&bigCatConcGroup&&bigCatConcPct>70){
        icon='🐋';text=`${bigTx.length} transaksi besar terkonsentrasi di ${bigCatConcGroup.emoji} ${bigCatConcGroup.name} (${bigCatConcPct}% dari big tx).`;
        action=`Deep dive ke ${bigCatConcGroup.name} — potensi penghematan terbesar ada di sini. Cari promo, alternatif, atau negosiasi harga.`;
      } else if(bigTx.length>1&&bigPct>50){
        icon='🐋';text=`${bigTx.length} transaksi besar (≥${idr(avgAmt*2)}) menyumbang ${bigPct}% dari total.`;
        action=`Daripada ngurangin yang kecil-kecil, mending fokus ke beberapa transaksi besar itu dulu — impact-nya jauh lebih terasa.`;
      } else if(earlyBigPct>70&&bigTx.length>0){
        icon='🐋';text=`${earlyBigPct}% transaksi besar terjadi di awal period — efek gajian terasa.`;
        action=`List semua yang perlu dibeli sebelum gajian masuk agar big spending lebih terencana dan tidak impulsif.`;
      } else {
        icon='⚖️';text=`Spending style seimbang: mix transaksi kecil (${smallTx.length}x) dan besar (${bigTx.length}x), rata-rata ${idr(avgAmt)}/tx.`;
        action=prevAvgAmt>0&&avgAmt>prevAvgAmt*1.1?`Rata-rata per transaksi naik dari ${idr(prevAvgAmt)} ke ${idr(avgAmt)} — tiap keluar makin mahal. Coba perhatiin next kali sebelum checkout, udah sesuai plan belum?`:`Pola spending kamu normal dan sehat bulan ini. Pertahankan aja — jangan sampai 'karena masih aman' jadi alasan buat tambah pengeluaran yang tidak perlu.`;
      }
      list.push({icon,text,action});
    }

    return list;
  },[mTx,total,prevTotal,prevTx,prev2Total,slices,byG,budgets,groups,recurring,selMonth,selYear]);

  return(
    <div className="page-scroll">
      <div className="page-header">
        <div><div className="page-title">Analysis</div><div className="page-subtitle">Spending breakdown</div></div>
      </div>

      <div className="pills">
        {MN.map((m,i)=><div key={i} className={`chip ${selMonth===i?'on':''}`} onClick={()=>setSelMonth(i)}>{m.slice(0,3)}</div>)}
      </div>

      {/* Summary */}
      <div className="section">
        <div className="card">
          <div style={{fontSize:12,color:'var(--t2)',marginBottom:4}}>Total — {MN[selMonth]}</div>
          <div style={{fontFamily:'var(--fh)',fontSize:30,fontWeight:800,letterSpacing:'-1px'}}>{idr(total)}</div>
          <div style={{fontSize:12,color:'var(--t3)',marginTop:4}}>{mTx.length} tx · {new Date(selYear,selMonth-1,25).toLocaleDateString('id-ID',{day:'numeric',month:'short'})} - {new Date(selYear,selMonth,24).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}</div>
        </div>
      </div>

      {!total?(
        <div className="section"><div className="card" style={{textAlign:'center',padding:32,color:'var(--t3)',fontSize:13}}>No transactions this period</div></div>
      ):(
        <>
          {/* Spending Insights */}
          <div className="section">
            <div className="fxb" style={{marginBottom:12}}>
              <div className="section-label" style={{margin:0}}>Spending Insights ✨</div>
              <button onClick={()=>setShowInsights(v=>!v)} style={{background:'var(--abg)',border:'.5px solid var(--a)',borderRadius:20,padding:'5px 14px',fontSize:12,color:'var(--a)',cursor:'pointer',fontFamily:'var(--fb)',fontWeight:500}}>
                {showInsights?'Collapse':'Expand'}
              </button>
            </div>
            {showInsights&&(
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {insights.map((ins,i)=>(
                  <div key={i} className="card" style={{padding:16}}>
                    <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                      <div style={{fontSize:20,flexShrink:0,marginTop:1}}>{ins.icon}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,lineHeight:1.5,color:'var(--t1)'}}>{ins.text}</div>
                        {ins.action&&(
                          <div style={{marginTop:8,padding:'8px 10px',background:'var(--abg)',borderRadius:8,borderLeft:'2px solid var(--a)',fontSize:13,color:'var(--a)',lineHeight:1.5}}>
                            ➜ {ins.action}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

          </div>
          {/* Spending Forecast */}
          <div className="section">
            <div className="section-label">Spending Forecast</div>
            <div className="card" style={{borderColor:coach.status==='over'?'rgba(255,77,77,.35)':coach.status==='tight'?'rgba(255,179,71,.35)':'var(--b1)'}}>
              <div style={{marginBottom:14,minWidth:0}}>
                <div style={{fontSize:12,color:'var(--t2)',marginBottom:4}}>Projected end-period</div>
                <div style={{fontFamily:'var(--fh)',fontSize:25,fontWeight:800,lineHeight:1.05,color:coach.status==='over'?'var(--red)':coach.status==='tight'?'var(--amber)':'var(--a)',whiteSpace:'nowrap',letterSpacing:0}}>{idr(coach.forecast)}</div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,minmax(0,1fr))',gap:8,marginBottom:12}}>
                <div style={{background:'var(--bg3)',borderRadius:10,padding:10,minWidth:0}}>
                  <div style={{fontSize:11,color:'var(--t3)',marginBottom:4}}>Target</div>
                  <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700,lineHeight:1.12,overflowWrap:'anywhere'}}>{coach.target?idr(coach.target):'No target'}</div>
                </div>
                <div style={{background:'var(--bg3)',borderRadius:10,padding:10,minWidth:0}}>
                  <div style={{fontSize:11,color:'var(--t3)',marginBottom:4}}>Safe/day</div>
                  <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700,lineHeight:1.12,color:'var(--a)',overflowWrap:'anywhere'}}>{coach.target?idr(coach.safeToday):'-'}</div>
                </div>
                <div style={{background:'var(--bg3)',borderRadius:10,padding:10,minWidth:0}}>
                  <div style={{fontSize:11,color:'var(--t3)',marginBottom:4}}>Days left</div>
                  <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700}}>{coach.daysLeftInclToday}</div>
                </div>
              </div>
              <div style={{fontSize:13,lineHeight:1.5,color:'var(--t2)'}}>
                {coach.status==='no-target'
                  ? 'Belum ada budget bulanan. Set budget dulu biar app bisa ngasih batas harian yang bener.'
                  : coach.status==='over'
                    ? `Kalau pace begini terus, bakal lewat target ${idr(coach.forecast-coach.target)}. Mulai hari ini turunin sekitar ${idr(coach.neededCut)}/hari.`
                    : coach.status==='tight'
                      ? 'Masih bisa aman, tapi margin-nya tipis. Jangan habisin sisa budget cuma karena kelihatan masih ada.'
                      : coach.status==='closed'
                        ? 'Period ini sudah selesai. Pakai angka ini sebagai baseline buat period berikutnya.'
                        : `Pace masih aman. Sisa ruang sampai target sekitar ${idr(Math.max(coach.remaining,0))}.`}
              </div>
            </div>
          </div>

          {/* Category Brake Detail */}
          {categoryBrakes.length>0&&(
            <div className="section">
              <div className="section-label">Category Brake Detail</div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {categoryBrakes.map(x=>{
                  const col=x.status==='over'?'var(--red)':x.status==='brake'?'var(--amber)':x.status==='tight'?'var(--a)':'var(--t2)';
                  return(
                    <div key={x.group.id} className="card" style={{padding:14}}>
                      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                        <div style={{width:36,height:36,borderRadius:10,background:`${x.group.color}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{x.group.emoji}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:14,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{x.group.name}</div>
                          <div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{x.txCount} tx | forecast {idr(x.forecast)}</div>
                        </div>
                        <div style={{fontSize:11,fontWeight:800,color:col,textTransform:'uppercase'}}>{x.status}</div>
                      </div>
                      <div className="prog-track" style={{height:5,marginBottom:10}}>
                        <div className="prog-fill" style={{width:`${Math.min(x.usage*100,100)}%`,background:col}}/>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(3,minmax(0,1fr))',gap:8,marginBottom:10}}>
                        <div style={{background:'var(--bg3)',borderRadius:10,padding:9,minWidth:0}}>
                          <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>Spent</div>
                          <div style={{fontFamily:'var(--fh)',fontSize:13,fontWeight:700,overflowWrap:'anywhere'}}>{idr(x.spent)}</div>
                        </div>
                        <div style={{background:'var(--bg3)',borderRadius:10,padding:9,minWidth:0}}>
                          <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>Budget</div>
                          <div style={{fontFamily:'var(--fh)',fontSize:13,fontWeight:700,overflowWrap:'anywhere'}}>{idr(x.budget)}</div>
                        </div>
                        <div style={{background:'var(--bg3)',borderRadius:10,padding:9,minWidth:0}}>
                          <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>Limit/day</div>
                          <div style={{fontFamily:'var(--fh)',fontSize:13,fontWeight:700,color:col,overflowWrap:'anywhere'}}>{idr(x.safePerDay)}</div>
                        </div>
                      </div>
                      <div style={{fontSize:13,lineHeight:1.45,color:'var(--t2)'}}>{x.reason} <span style={{color:col,fontWeight:700}}>{x.limitText}</span></div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Pie Chart */}
          <div className="section">
            <div className="section-label">By Category</div>
            <div className="card">
              <svg viewBox="0 0 200 200" width="100%" style={{maxWidth:220,display:'block',margin:'0 auto',cursor:'pointer'}} onClick={()=>setShowRp(v=>!v)}>
                {slices.map((s,i)=>(
                  <path key={s.gid}
                    d={arc(100,100,hovered===i?88:82,s.startAngle,s.startAngle+s.angle-(slices.length>1?.8:0))}
                    fill={s.color} opacity={hovered!=null&&hovered!==i?.4:1}
                    style={{transition:'all .2s',cursor:'pointer'}}
                    onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
                    onTouchStart={()=>setHovered(hovered===i?null:i)}/>
                ))}
                <circle cx="100" cy="100" r="46" fill="var(--bg2)"/>
                {active?(
                  <>
                    <text x="100" y="91" textAnchor="middle" fontSize="20" fill="white">{active.emoji}</text>
                    <text x="100" y="107" textAnchor="middle" fontSize="9" fill="var(--t2)" fontFamily="DM Sans">{active.name}</text>
                    <text x="100" y="121" textAnchor="middle" fontSize="11" fill={active.color} fontWeight="700" fontFamily="Syne">
                      {showRp?`Rp${Math.round(active.amt/1000)}K`:`${(active.pct*100).toFixed(1)}%`}
                    </text>
                  </>
                ):(
                  <>
                    <text x="100" y="97" textAnchor="middle" fontSize="10" fill="var(--t2)" fontFamily="DM Sans">Tap chart</text>
                    <text x="100" y="113" textAnchor="middle" fontSize="11" fill="var(--t1)" fontWeight="700" fontFamily="Syne">
                      {showRp?"Rp":"% mode"}
                    </text>
                  </>
                )}
              </svg>
              <div style={{textAlign:'center',fontSize:11,color:'var(--t3)',marginTop:2,marginBottom:12}}>Tap chart to toggle % / Rp</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {slices.map((s,i)=>(
                  <div key={s.gid} style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',opacity:hovered!=null&&hovered!==i?.4:1,transition:'opacity .2s'}}
                    onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
                    onTouchStart={()=>setHovered(hovered===i?null:i)}>
                    <div style={{width:10,height:10,borderRadius:'50%',background:s.color,flexShrink:0}}/>
                    <div style={{flex:1,fontSize:13}}>{s.emoji} {s.name}</div>
                    <div style={{fontSize:13,fontFamily:'var(--fh)',fontWeight:700,color:s.color}}>{idr(s.amt)}</div>
                    <div style={{fontSize:12,color:'var(--t3)',width:38,textAlign:'right'}}>{(s.pct*100).toFixed(1)}%</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Monthly Trend Chart */}
          <MonthlyTrendChart txs={txs} groups={groups} subCats={subCats} selMonth={selMonth} selYear={selYear}/>

          {/* Top 5 Categories */}
          <div className="section">
            <div className="section-label">Top 5 Expense Categories</div>
            <div className="card" style={{padding:'8px 18px'}}>
              {top5.map((s,i)=>(
                <div key={s.gid} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<top5.length-1?'.5px solid var(--b1)':'none'}}>
                  <div style={{width:24,height:24,borderRadius:'50%',background:'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontFamily:'var(--fh)',fontWeight:700,color:'var(--t3)',flexShrink:0}}>
                    {i+1}
                  </div>
                  <div style={{width:36,height:36,borderRadius:10,background:`${s.color}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{s.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:500}}>{s.name}</div>
                    <div style={{marginTop:4,height:4,borderRadius:2,background:'var(--bg4)',overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${(s.pct*100).toFixed(0)}%`,background:s.color,borderRadius:2}}/>
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700,color:s.color}}>{idr(s.amt)}</div>
                    <div style={{fontSize:11,color:'var(--t3)'}}>{(s.pct*100).toFixed(1)}%</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Largest Transactions */}
          <div className="section">
            <div className="section-label">Largest Transactions</div>
            <div className="card" style={{padding:'4px 18px'}}>
              {largest.map((t,i)=>{
                const g=groups.find(x=>x.id===t.group_id);
                return(
                  <div key={t.id} className="tx-item">
                    <div style={{width:24,fontFamily:'var(--fh)',fontSize:13,fontWeight:700,color:'var(--t3)',flexShrink:0,textAlign:'center'}}>#{i+1}</div>
                    <div className="tx-icon" style={{background:`${g?.color||'#888'}20`}}>{g?.emoji||'💰'}</div>
                    <div className="tx-info">
                      <div className="tx-name">{t.description}</div>
                      <div className="tx-meta">{g?.name} · {new Date(t.date).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div className="tx-amt">-{idr(t.amount)}</div>
                      <div style={{fontSize:11,color:'var(--t3)'}}>{((t.amount/total)*100).toFixed(1)}% of total</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Recurring Expenses */}
          <div className="section">
            <div className="section-label">Recurring Expenses</div>
            {recurring.length===0?(
              <div className="card" style={{textAlign:'center',padding:20,color:'var(--t3)',fontSize:13}}>No recurring expenses detected</div>
            ):(
              <div className="card" style={{padding:'4px 18px'}}>
                {recurring.map((r,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:i<recurring.length-1?'.5px solid var(--b1)':'none'}}>
                    <div style={{width:36,height:36,borderRadius:10,background:'var(--bluebg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🔄</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:500}}>{r.desc}</div>
                      <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>Appears {r.count}x · avg {idr(Math.round(r.total/r.count))}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700,color:'var(--blue)'}}>{idr(r.total)}</div>
                      <div style={{fontSize:11,color:'var(--t3)'}}>{r.count} times</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

        </>
      )}
    </div>
  );
})


// ── APP ───────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>getSession());
  const [tab,setTab]=useState('dash');
  const [showAdd,setShowAdd]=useState(false);
  const [editTxItem,setEditTxItem]=useState(null);
  const [txs,setTxs]=useState([]);
  const [groups,setGroups]=useState([]);
  const [budgets,setBudgets]=useState([]);
  const [sources,setSources]=useState([]);
  const [subCats,setSubCats]=useState([]);
  const [syncing,setSyncing]=useState(false);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const showT=useCallback((msg,icon='✓')=>{setToast({msg,icon});setTimeout(()=>setToast(null),2500)},[]);

  const load=useCallback(async(uid)=>{
    if(!uid)return;
    setSyncing(true);
    try{
      const [t,g,b,s,sc]=await Promise.all([
        db.get('transactions','order=date.desc,created_at.desc&select=*'),
        db.get('groups','order=created_at.asc&select=*'),
        db.get('budgets','order=created_at.asc&select=*'),
        db.get('sources','order=created_at.asc&select=*'),
        db.get('sub_categories','order=created_at.asc&select=*'),
      ]);
      setTxs(t);setGroups(g);setBudgets(b);setSources(s);setSubCats(sc);
    }catch{showT('Sync failed','⚠️')}
    setSyncing(false);setLoading(false);
  },[]);

  useEffect(()=>{if(user)load(user.id);else setLoading(false)},[user]);

  const login=useCallback(u=>{setUser(u);setTab('dash')},[]);
  const logout=useCallback(()=>{clearSession();setUser(null);setTxs([]);setGroups([]);setBudgets([]);setSources([]);setSubCats([])},[]);

  // Optimistic updates: update UI immediately, sync to Supabase in background.
  const addTx=useCallback(tx=>{
    setTxs(a=>[tx,...a]);
    db.post('transactions',tx).then(()=>showT('Saved ☁️')).catch(()=>{setTxs(a=>a.filter(t=>t.id!==tx.id));showT('Failed - rolled back','⚠️')});
  },[]);
  const delTx=useCallback(id=>{
    let removed;
    setTxs(a=>{removed=a.find(t=>t.id===id);return a.filter(t=>t.id!==id)});
    showT('Deleted','🗑');
    db.del('transactions',id).catch(()=>{if(removed)setTxs(a=>[removed,...a]);showT('Failed - restored','⚠️')});
  },[]);
  const updateTx=useCallback(tx=>{
    let prev;
    setTxs(a=>{prev=a.find(t=>t.id===tx.id);return a.map(t=>t.id===tx.id?tx:t)});
    setEditTxItem(null);
    showT('Updated ✓');
    db.patch('transactions',tx.id,tx).catch(()=>{if(prev)setTxs(a=>a.map(t=>t.id===tx.id?prev:t));showT('Failed - reverted','⚠️')});
  },[]);

  if(!user)return <div style={{flex:1,display:'flex',flexDirection:'column',height:'100vh',background:'var(--bg)'}}><Login onLogin={login}/></div>;
  if(loading)return <div style={{flex:1,display:'flex',flexDirection:'column',height:'100vh',alignItems:'center',justifyContent:'center',background:'var(--bg)',gap:16}}><div style={{fontSize:48}}>💸</div><div style={{fontFamily:'var(--fh)',fontSize:24,fontWeight:800}}>Trackr</div><div style={{fontSize:13,color:'var(--t2)',display:'flex',alignItems:'center',gap:6}}><span className="sync-dot spin"/>Loading...</div></div>;

  const NAV=[
    {id:'dash',icon:'home',label:'Overview'},
    {id:'hist',icon:'hist',label:'History'},
    {id:'analysis',icon:'chart',label:'Analysis'},
    {id:'master',icon:'tag',label:'Master'},
    {id:'profile',icon:'user',label:user.displayName.split(' ')[0]},
  ];

  return(
    <>
      {toast&&<Toast msg={toast.msg} icon={toast.icon}/>}

      {/* Desktop sidebar */}
      <div className="sidebar">
        <div className="sb-brand"><span>💸</span>Trackr</div>
        <button className="sb-fab" onClick={()=>setShowAdd(true)}><Ic n="plus" s={18}/> Add Transaction</button>
        <div className="sb-divider"/>
        {NAV.map(n=>(
          <div key={n.id} className={`sb-item ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
            <Ic n={n.icon} s={18}/>{n.label}
          </div>
        ))}
        <div className="sb-spacer"/>
        <div className="sb-divider"/>
        <div className="sb-item" onClick={logout}><Ic n="out" s={18}/>Sign Out</div>
      </div>

      {/* Main content */}
      <div className="main-wrap">
        {tab==='dash'&&<Dashboard txs={txs} groups={groups} subCats={subCats} budgets={budgets} sources={sources} onRefresh={()=>load(user.id)} syncing={syncing} onEditTx={setEditTxItem}/>}
        {tab==='hist'&&<History txs={txs} groups={groups} subCats={subCats} sources={sources} onDelete={delTx} onEdit={setEditTxItem}/>}
        {tab==='analysis'&&<SpendAnalysis txs={txs} groups={groups} budgets={budgets} subCats={subCats}/>}
        {tab==='master'&&<Master groups={groups} setGroups={setGroups} budgets={budgets} setBudgets={setBudgets} sources={sources} setSources={setSources} subCats={subCats} setSubCats={setSubCats} currentUser={user}/>}
        {tab==='profile'&&<Profile currentUser={user} txs={txs} onRefresh={()=>load(user.id)} onLogout={logout}/>}
      </div>

      {/* Mobile bottom nav */}
      <nav className="bottom-nav" style={{justifyContent:'space-around'}}>
        <div className={`nav-item ${tab==='dash'?'active':''}`} onClick={()=>setTab('dash')}><Ic n="home"/><span>Overview</span></div>
        <div className={`nav-item ${tab==='hist'?'active':''}`} onClick={()=>setTab('hist')}><Ic n="hist"/><span>History</span></div>
        <div className="nav-fab" onClick={()=>setShowAdd(true)} style={{margin:'0 2px'}}><Ic n="plus"/></div>
        <div className={`nav-item ${tab==='analysis'?'active':''}`} onClick={()=>setTab('analysis')}><Ic n="chart"/><span>Analysis</span></div>
        <div className={`nav-item ${tab==='profile'?'active':''}`} onClick={()=>setTab('profile')}><Ic n="user"/><span style={{color:tab==='profile'?'var(--a)':'var(--t3)'}}>{user.displayName.split(' ')[0]}</span></div>
      </nav>

      {showAdd&&<AddTx groups={groups} subCats={subCats} sources={sources} userId={user.id} createdBy={user.displayName} onSave={addTx} onClose={()=>setShowAdd(false)}/>}
      {editTxItem&&<EditTx tx={editTxItem} groups={groups} subCats={subCats} sources={sources} onSave={updateTx} onClose={()=>setEditTxItem(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
