// ── SPEND ANALYSIS ───────────────────────────────────────────────────
function SpendAnalysis({txs,groups,budgets}){
  const [selMonth,setSelMonth]=useState(new Date().getMonth());
  const [selYear]=useState(new Date().getFullYear());
  const [showRp,setShowRp]=useState(false);
  const [hovered,setHovered]=useState(null);
  const [showInsights,setShowInsights]=useState(false);

  const mTx=useMemo(()=>{
    const s=new Date(selYear,selMonth-1,25).toISOString().split('T')[0];
    const e=new Date(selYear,selMonth,24).toISOString().split('T')[0];
    return txs.filter(t=>t.date>=s&&t.date<=e);
  },[txs,selMonth,selYear]);

  const total=useMemo(()=>mTx.reduce((s,t)=>s+t.amount,0),[mTx]);

  const byG=useMemo(()=>{
    const m={};mTx.forEach(t=>{m[t.group_id]=(m[t.group_id]||0)+t.amount});return m;
  },[mTx]);

  // Slices for pie
  const slices=useMemo(()=>{
    if(!total)return[];
    let cum=0;
    return Object.entries(byG).sort((a,b)=>b[1]-a[1]).map(([gid,amt])=>{
      const g=groups.find(x=>x.id===gid);
      const pct=amt/total,angle=pct*360;
      const s={gid,amt,pct,angle,startAngle:cum,color:g?.color||'#888',name:g?.name||'Other',emoji:g?.emoji||'💰'};
      cum+=angle;return s;
    });
  },[byG,total,groups]);

  // Top 5 categories
  const top5=useMemo(()=>slices.slice(0,5),[slices]);

  // Largest transactions
  const largest=useMemo(()=>[...mTx].sort((a,b)=>b.amount-a.amount).slice(0,5),[mTx]);

  // Recurring detection - same description appears 2+ times
  const recurring=useMemo(()=>{
    const map={};
    mTx.forEach(t=>{
      const key=t.description.toLowerCase().trim();
      if(!map[key])map[key]={desc:t.description,count:0,total:0,dates:[]};
      map[key].count++;map[key].total+=t.amount;map[key].dates.push(t.date);
    });
    return Object.values(map).filter(x=>x.count>=2).sort((a,b)=>b.count-a.count);
  },[mTx]);

  const arc=(cx,cy,r,s,e)=>{
    const rad=d=>d*Math.PI/180;
    const x1=cx+r*Math.sin(rad(s)),y1=cy-r*Math.cos(rad(s));
    const x2=cx+r*Math.sin(rad(e)),y2=cy-r*Math.cos(rad(e));
    return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${e-s>180?1:0} 1 ${x2} ${y2} Z`;
  };

  const active=hovered!=null?slices[hovered]:null;

  // Previous month data for comparison
  const prevTx=useMemo(()=>{
    const s=new Date(selYear,selMonth-2,25).toISOString().split('T')[0];
    const e=new Date(selYear,selMonth-1,24).toISOString().split('T')[0];
    return txs.filter(t=>t.date>=s&&t.date<=e);
  },[txs,selMonth,selYear]);
  const prevTotal=useMemo(()=>prevTx.reduce((s,t)=>s+t.amount,0),[prevTx]);

  // Rule-based insights
  const insights=useMemo(()=>{
    if(!mTx.length||!total)return[];
    const list=[];

    // 1. MoM comparison
    if(prevTotal>0){
      const diff=total-prevTotal;
      const pct=Math.abs((diff/prevTotal)*100).toFixed(0);
      const prevMonthName=MN[selMonth-1>=0?selMonth-1:11];
      if(diff>0){
        list.push({
          icon:'📈',
          text:`Pengeluaran naik ${pct}% vs ${prevMonthName} (${idr(prevTotal)}). Selisih +${idr(diff)}.`,
          action:`Coba kurangi pengeluaran ${idr(Math.abs(diff))} bulan depan untuk kembali ke level ${prevMonthName}.`
        });
      } else if(diff<0){
        list.push({
          icon:'📉',
          text:`Pengeluaran turun ${pct}% vs ${prevMonthName} (${idr(prevTotal)}). Hemat ${idr(Math.abs(diff))}!`,
          action:`Pertahankan kebiasaan ini. Jika konsisten, bisa hemat ${idr(Math.abs(diff)*12)}/tahun.`
        });
      } else {
        list.push({icon:'📊',text:`Pengeluaran sama dengan ${prevMonthName} (${idr(prevTotal)}).`,action:null});
      }
    } else {
      list.push({icon:'📊',text:`Belum ada data bulan sebelumnya untuk perbandingan.`,action:null});
    }

    // 2. Top category dominance + action
    if(slices.length>0){
      const top=slices[0];
      const saving50=Math.round(top.amt*0.5);
      if(top.pct>0.4){
        list.push({
          icon:'⚠️',
          text:`${top.emoji} ${top.name} mendominasi ${(top.pct*100).toFixed(0)}% pengeluaran (${idr(top.amt)}).`,
          action:`Jika dikurangi 50%, potensi penghematan ${idr(saving50)}/bulan atau ${idr(saving50*12)}/tahun.`
        });
      } else {
        list.push({
          icon:'📊',
          text:`Top category: ${top.emoji} ${top.name} sebesar ${idr(top.amt)} (${(top.pct*100).toFixed(0)}% dari total).`,
          action:`Pengeluaran cukup terdistribusi. Bagus!`
        });
      }
    }

    // 3. Budget check + action
    const overBudget=groups.filter(g=>{
      const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');
      return b&&(byG[g.id]||0)>b.amount;
    });
    const nearBudget=groups.filter(g=>{
      const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');
      if(!b)return false;
      const pct=(byG[g.id]||0)/b.amount;
      return pct>=0.8&&pct<1;
    });
    if(overBudget.length>0){
      const totalOver=overBudget.reduce((s,g)=>{
        const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');
        return s+((byG[g.id]||0)-b.amount);
      },0);
      list.push({
        icon:'🚨',
        text:`${overBudget.map(g=>g.name).join(', ')} melebihi budget total ${idr(totalOver)}.`,
        action:`Stop atau tunda pengeluaran di kategori tersebut hingga akhir periode.`
      });
    } else if(nearBudget.length>0){
      list.push({
        icon:'⚠️',
        text:`${nearBudget.map(g=>g.name).join(', ')} sudah mencapai >80% budget.`,
        action:`Hati-hati, sisa budget tinggal sedikit. Pantau pengeluaran lebih ketat.`
      });
    } else if(budgets.length>0){
      list.push({icon:'✅',text:`Semua kategori masih dalam batas budget. Kerja bagus!`,action:null});
    }

    // 4. Recurring + action
    if(recurring.length>0){
      const top=recurring[0];
      const saving=Math.round(top.total*0.5);
      list.push({
        icon:'🔄',
        text:`"${top.desc}" rutin ${top.count}x = ${idr(top.total)} bulan ini.`,
        action:`Jika frekuensinya dikurangi setengah, hemat ${idr(saving)}/bulan.`
      });
    }

    // 5. Daily average + action
    const avgDay=Math.round(total/30);
    const prevAvgDay=prevTotal?Math.round(prevTotal/30):0;
    list.push({
      icon:'📅',
      text:`Rata-rata harian ${idr(avgDay)}${prevAvgDay?` (bulan lalu: ${idr(prevAvgDay)})`:''}.`,
      action:avgDay>300000?`Target turunkan ke ${idr(Math.round(avgDay*0.8))}/hari untuk hemat ${idr(Math.round(avgDay*0.2*30))}/bulan.`:null
    });

    // 6. Avg per transaction
    const avgAmt=Math.round(total/mTx.length);
    list.push({
      icon:'💡',
      text:`${mTx.length} transaksi, rata-rata ${idr(avgAmt)}/transaksi.`,
      action:mTx.length>50?`Frekuensi tinggi. Coba batching belanja untuk kurangi impuls belanja.`:null
    });

    return list;
  },[mTx,total,prevTotal,prevTx,slices,byG,budgets,groups,recurring,selMonth,selYear]);

  return(
    <div className="page-scroll">
      <div className="page-header">
        <div><div className="page-title">Analysis</div><div className="page-subtitle">Spending breakdown</div></div>
      </div>

      <div className="pills">
        {MN.map((m,i)=><div key={i} className={`chip ${selMonth===i?'on':''}`} onClick={()=>{setSelMonth(i);setAiInsights(null)}}>{m.slice(0,3)}</div>)}
      </div>

      {/* Summary */}
      <div className="section">
        <div className="card">
          <div style={{fontSize:12,color:'var(--t2)',marginBottom:4}}>Total — {MN[selMonth]}</div>
          <div style={{fontFamily:'var(--fh)',fontSize:30,fontWeight:800,letterSpacing:'-1px'}}>{idr(total)}</div>
          <div style={{fontSize:12,color:'var(--t3)',marginTop:4}}>{mTx.length} tx · {new Date(selYear,selMonth-1,25).toLocaleDateString('id-ID',{day:'numeric',month:'short'})} - {new Date(selYear,selMonth,24).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}</div>
        </div>
      </div>

      {!total?(
        <div className="section"><div className="card" style={{textAlign:'center',padding:32,color:'var(--t3)',fontSize:13}}>No transactions this period</div></div>
      ):(
        <>
          {/* Spending Insights */}
          <div className="section">
            <div className="fxb" style={{marginBottom:12}}>
              <div className="section-label" style={{margin:0}}>Spending Insights ✨</div>
              <button onClick={()=>setShowInsights(v=>!v)} style={{background:'var(--abg)',border:'.5px solid var(--a)',borderRadius:20,padding:'5px 14px',fontSize:12,color:'var(--a)',cursor:'pointer',fontFamily:'var(--fb)',fontWeight:500}}>
                {showInsights?'Hide':'Show'}
              </button>
            </div>
            {showInsights&&(
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {insights.map((ins,i)=>(
                  <div key={i} className="card" style={{padding:16}}>
                    <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                      <div style={{fontSize:20,flexShrink:0,marginTop:1}}>{ins.icon}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,lineHeight:1.5,color:'var(--t1)'}}>{ins.text}</div>
                        {ins.action&&(
                          <div style={{marginTop:8,padding:'8px 10px',background:'var(--abg)',borderRadius:8,borderLeft:'2px solid var(--a)',fontSize:13,color:'var(--a)',lineHeight:1.5}}>
                            ➜ {ins.action}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
            {!showInsights&&(
              <div className="card" style={{textAlign:'center',padding:20,cursor:'pointer'}} onClick={()=>setShowInsights(true)}>
                <div style={{fontSize:24,marginBottom:6}}>💡</div>
                <div style={{fontSize:13,color:'var(--t2)'}}>Tap Show untuk lihat insights pengeluaran bulan ini</div>
              </div>
            )}
          </div>
          {/* Pie Chart */}
          <div className="section">
            <div className="section-label">By Category</div>
            <div className="card">
              <svg viewBox="0 0 200 200" width="100%" style={{maxWidth:220,display:'block',margin:'0 auto',cursor:'pointer'}} onClick={()=>setShowRp(v=>!v)}>
                {slices.map((s,i)=>(
                  <path key={s.gid}
                    d={arc(100,100,hovered===i?88:82,s.startAngle,s.startAngle+s.angle-(slices.length>1?.8:0))}
                    fill={s.color} opacity={hovered!=null&&hovered!==i?.4:1}
                    style={{transition:'all .2s',cursor:'pointer'}}
                    onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
                    onTouchStart={()=>setHovered(hovered===i?null:i)}/>
                ))}
                <circle cx="100" cy="100" r="46" fill="var(--bg2)"/>
                {active?(
                  <>
                    <text x="100" y="91" textAnchor="middle" fontSize="20" fill="white">{active.emoji}</text>
                    <text x="100" y="107" textAnchor="middle" fontSize="9" fill="var(--t2)" fontFamily="DM Sans">{active.name}</text>
                    <text x="100" y="121" textAnchor="middle" fontSize="11" fill={active.color} fontWeight="700" fontFamily="Syne">
                      {showRp?`Rp${Math.round(active.amt/1000)}K`:`${(active.pct*100).toFixed(1)}%`}
                    </text>
                  </>
                ):(
                  <>
                    <text x="100" y="97" textAnchor="middle" fontSize="10" fill="var(--t2)" fontFamily="DM Sans">Tap chart</text>
                    <text x="100" y="113" textAnchor="middle" fontSize="11" fill="var(--t1)" fontWeight="700" fontFamily="Syne">
                      {showRp?"Rp":"% mode"}
                    </text>
                  </>
                )}
              </svg>
              <div style={{textAlign:'center',fontSize:11,color:'var(--t3)',marginTop:2,marginBottom:12}}>Tap chart to toggle % / Rp</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {slices.map((s,i)=>(
                  <div key={s.gid} style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',opacity:hovered!=null&&hovered!==i?.4:1,transition:'opacity .2s'}}
                    onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
                    onTouchStart={()=>setHovered(hovered===i?null:i)}>
                    <div style={{width:10,height:10,borderRadius:'50%',background:s.color,flexShrink:0}}/>
                    <div style={{flex:1,fontSize:13}}>{s.emoji} {s.name}</div>
                    <div style={{fontSize:13,fontFamily:'var(--fh)',fontWeight:700,color:s.color}}>{idr(s.amt)}</div>
                    <div style={{fontSize:12,color:'var(--t3)',width:38,textAlign:'right'}}>{(s.pct*100).toFixed(1)}%</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Top 5 Categories */}
          <div className="section">
            <div className="section-label">Top 5 Expense Categories</div>
            <div className="card" style={{padding:'8px 18px'}}>
              {top5.map((s,i)=>(
                <div key={s.gid} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<top5.length-1?'.5px solid var(--b1)':'none'}}>
                  <div style={{width:24,height:24,borderRadius:'50%',background:'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontFamily:'var(--fh)',fontWeight:700,color:'var(--t3)',flexShrink:0}}>
                    {i+1}
                  </div>
                  <div style={{width:36,height:36,borderRadius:10,background:`${s.color}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{s.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:500}}>{s.name}</div>
                    <div style={{marginTop:4,height:4,borderRadius:2,background:'var(--bg4)',overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${(s.pct*100).toFixed(0)}%`,background:s.color,borderRadius:2}}/>
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700,color:s.color}}>{idr(s.amt)}</div>
                    <div style={{fontSize:11,color:'var(--t3)'}}>{(s.pct*100).toFixed(1)}%</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Largest Transactions */}
          <div className="section">
            <div className="section-label">Largest Transactions</div>
            <div className="card" style={{padding:'4px 18px'}}>
              {largest.map((t,i)=>{
                const g=groups.find(x=>x.id===t.group_id);
                return(
                  <div key={t.id} className="tx-item">
                    <div style={{width:24,fontFamily:'var(--fh)',fontSize:13,fontWeight:700,color:'var(--t3)',flexShrink:0,textAlign:'center'}}>#{i+1}</div>
                    <div className="tx-icon" style={{background:`${g?.color||'#888'}20`}}>{g?.emoji||'💰'}</div>
                    <div className="tx-info">
                      <div className="tx-name">{t.description}</div>
                      <div className="tx-meta">{g?.name} · {new Date(t.date).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div className="tx-amt">-{idr(t.amount)}</div>
                      <div style={{fontSize:11,color:'var(--t3)'}}>{((t.amount/total)*100).toFixed(1)}% of total</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Recurring Expenses */}
          <div className="section">
            <div className="section-label">Recurring Expenses</div>
            {recurring.length===0?(
              <div className="card" style={{textAlign:'center',padding:20,color:'var(--t3)',fontSize:13}}>No recurring expenses detected</div>
            ):(
              <div className="card" style={{padding:'4px 18px'}}>
                {recurring.map((r,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:i<recurring.length-1?'.5px solid var(--b1)':'none'}}>
                    <div style={{width:36,height:36,borderRadius:10,background:'var(--bluebg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🔄</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:500}}>{r.desc}</div>
                      <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>Appears {r.count}x · avg {idr(Math.round(r.total/r.count))}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700,color:'var(--blue)'}}>{idr(r.total)}</div>
                      <div style={{fontSize:11,color:'var(--t3)'}}>{r.count} times</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

        </>
      )}
    </div>
  );
}


// ── APP ───────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>getSession());
  const [tab,setTab]=useState('dash');
  const [showAdd,setShowAdd]=useState(false);
  const [editTxItem,setEditTxItem]=useState(null);
  const [txs,setTxs]=useState([]);
  const [groups,setGroups]=useState([]);
  const [budgets,setBudgets]=useState([]);
  const [sources,setSources]=useState([]);
  const [subCats,setSubCats]=useState([]);
  const [syncing,setSyncing]=useState(false);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const showT=(msg,icon='✓')=>{setToast({msg,icon});setTimeout(()=>setToast(null),2500)};

  const load=useCallback(async(uid)=>{
    if(!uid)return;
    setSyncing(true);
    try{
      const [t,g,b,s,sc]=await Promise.all([
        db.get('transactions','order=date.desc,created_at.desc&select=*'),
        db.get('groups','order=created_at.asc&select=*'),
        db.get('budgets','order=created_at.asc&select=*'),
        db.get('sources','order=created_at.asc&select=*'),
        db.get('sub_categories','order=created_at.asc&select=*'),
      ]);
      setTxs(t);setGroups(g);setBudgets(b);setSources(s);setSubCats(sc);
    }catch{showT('Sync failed','⚠️')}
    setSyncing(false);setLoading(false);
  },[]);

  useEffect(()=>{if(user)load(user.id);else setLoading(false)},[user]);

  const login=u=>{setUser(u);setTab('dash')};
  const logout=()=>{clearSession();setUser(null);setTxs([]);setGroups([]);setBudgets([]);setSources([]);setSubCats([])};
  const addTx=async tx=>{try{await db.post('transactions',tx);setTxs(a=>[tx,...a]);showT('Saved ☁️')}catch{showT('Failed','⚠️')}};
  const delTx=async id=>{try{await db.del('transactions',id);setTxs(a=>a.filter(t=>t.id!==id));showT('Deleted','🗑')}catch{showT('Failed','⚠️')}};
  const updateTx=async tx=>{try{await db.patch('transactions',tx.id,tx);setTxs(a=>a.map(t=>t.id===tx.id?tx:t));showT('Updated ✓');setEditTxItem(null);}catch{showT('Failed','⚠️')}};

  if(!user)return <div style={{flex:1,display:'flex',flexDirection:'column',height:'100vh',background:'var(--bg)'}}><Login onLogin={login}/></div>;
  if(loading)return <div style={{flex:1,display:'flex',flexDirection:'column',height:'100vh',alignItems:'center',justifyContent:'center',background:'var(--bg)',gap:16}}><div style={{fontSize:48}}>💸</div><div style={{fontFamily:'var(--fh)',fontSize:24,fontWeight:800}}>Trackr</div><div style={{fontSize:13,color:'var(--t2)',display:'flex',alignItems:'center',gap:6}}><span className="sync-dot spin"/>Loading...</div></div>;

  const NAV=[
    {id:'dash',icon:'home',label:'Overview'},
    {id:'hist',icon:'hist',label:'History'},
    {id:'analysis',icon:'chart',label:'Analysis'},
    {id:'master',icon:'tag',label:'Master'},
    {id:'profile',icon:'user',label:user.displayName.split(' ')[0]},
  ];

  return(
    <>
      {toast&&<Toast msg={toast.msg} icon={toast.icon}/>}

      {/* Desktop sidebar */}
      <div className="sidebar">
        <div className="sb-brand"><span>💸</span>Trackr</div>
        <button className="sb-fab" onClick={()=>setShowAdd(true)}><Ic n="plus" s={18}/> Add Transaction</button>
        <div className="sb-divider"/>
        {NAV.map(n=>(
          <div key={n.id} className={`sb-item ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
            <Ic n={n.icon} s={18}/>{n.label}
          </div>
        ))}
        <div className="sb-spacer"/>
        <div className="sb-divider"/>
        <div className="sb-item" onClick={logout}><Ic n="out" s={18}/>Sign Out</div>
      </div>

      {/* Main content */}
      <div className="main-wrap">
        {tab==='dash'&&<Dashboard txs={txs} groups={groups} budgets={budgets} onRefresh={()=>load(user.id)} syncing={syncing} onEditTx={setEditTxItem}/>}
        {tab==='hist'&&<History txs={txs} groups={groups} onDelete={delTx} onEdit={setEditTxItem}/>}
        {tab==='analysis'&&<SpendAnalysis txs={txs} groups={groups} budgets={budgets}/>}
        {tab==='master'&&<Master groups={groups} setGroups={setGroups} budgets={budgets} setBudgets={setBudgets} sources={sources} setSources={setSources} subCats={subCats} setSubCats={setSubCats} currentUser={user}/>}
        {tab==='profile'&&<Profile currentUser={user} txs={txs} onRefresh={()=>load(user.id)} onLogout={logout}/>}
      </div>

      {/* Mobile bottom nav */}
      <nav className="bottom-nav" style={{justifyContent:'space-around'}}>
        <div className={`nav-item ${tab==='dash'?'active':''}`} onClick={()=>setTab('dash')}><Ic n="home"/><span>Overview</span></div>
        <div className={`nav-item ${tab==='hist'?'active':''}`} onClick={()=>setTab('hist')}><Ic n="hist"/><span>History</span></div>
        <div className="nav-fab" onClick={()=>setShowAdd(true)} style={{margin:'0 2px'}}><Ic n="plus"/></div>
        <div className={`nav-item ${tab==='analysis'?'active':''}`} onClick={()=>setTab('analysis')}><Ic n="chart"/><span>Analysis</span></div>
        <div className={`nav-item ${tab==='profile'?'active':''}`} onClick={()=>setTab('profile')}><Ic n="user"/><span style={{color:tab==='profile'?'var(--a)':'var(--t3)'}}>{user.displayName.split(' ')[0]}</span></div>
      </nav>

      {showAdd&&<AddTx groups={groups} subCats={subCats} sources={sources} userId={user.id} createdBy={user.displayName} onSave={addTx} onClose={()=>setShowAdd(false)}/>}
      {editTxItem&&<EditTx tx={editTxItem} groups={groups} subCats={subCats} sources={sources} onSave={updateTx} onClose={()=>setEditTxItem(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
