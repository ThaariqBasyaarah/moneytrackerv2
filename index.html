<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Trackr</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
      --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);
      --t1:#f0f0f0;--t2:#888;--t3:#555;
      --a:#c8f560;--a2:#a8e040;--abg:rgba(200,245,96,.08);
      --red:#ff4d4d;--redbg:rgba(255,77,77,.08);
      --blue:#4d9fff;--bluebg:rgba(77,159,255,.08);
      --amber:#ffb347;
      --r:16px;--rs:10px;
      --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
    }
    html,body{background:var(--bg);color:var(--t1);font-family:var(--fb);height:100%;overflow:hidden;margin:0;padding:0}
    #root{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--bg);overflow:hidden;position:relative}

    /* DESKTOP */
    @media(min-width:769px){
      #root{max-width:100%;flex-direction:row}
      .sidebar{display:flex!important}
      .bottom-nav{display:none!important}
      .main-wrap{margin-left:220px;flex:1;overflow:hidden;height:100vh;display:flex;flex-direction:column}
      .page-scroll{padding-bottom:24px}
      .page-header{padding:32px 40px 16px}
      .page-title{font-size:32px}
      .section{padding:0 40px}
      .hero-card{margin:0 40px 24px}
      .pills-scroll{padding:0 40px}
      .stats-grid{grid-template-columns:repeat(4,1fr)}
      .modal-overlay{align-items:center}
      .modal{max-width:480px}
    }
    @media(max-width:768px){
      .sidebar{display:none!important}
      .main-wrap{display:contents}
    }

    /* SIDEBAR */
    .sidebar{display:none;position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:.5px solid var(--b1);flex-direction:column;padding:24px 12px;gap:2px;z-index:50}
    .sb-brand{font-family:var(--fh);font-size:20px;font-weight:800;color:var(--t1);padding:0 12px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
    .sb-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--rs);cursor:pointer;transition:all .15s;color:var(--t2);font-size:14px}
    .sb-item:hover{background:var(--bg3);color:var(--t1)}
    .sb-item.active{background:var(--abg);color:var(--a)}
    .sb-item svg{flex-shrink:0;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
    .sb-fab{width:100%;padding:12px 14px;background:var(--a);color:#0a0a0a;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;font-family:var(--fh);cursor:pointer;display:flex;align-items:center;gap:8px;margin:8px 0;transition:all .2s}
    .sb-divider{height:.5px;background:var(--b1);margin:6px 4px}
    .sb-spacer{flex:1}

    /* BOTTOM NAV (mobile) */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);border-top:.5px solid var(--b1);display:flex;align-items:center;justify-content:space-around;padding-top:8px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));z-index:100}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 10px;flex:1}
    .nav-item svg{width:22px;height:22px;fill:none;stroke:var(--t3);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
    .nav-item span{font-size:10px;color:var(--t3);transition:color .2s}
    .nav-item.active svg{stroke:var(--a)}
    .nav-item.active span{color:var(--a);font-weight:500}
    .nav-fab{width:52px;height:52px;border-radius:50%;background:var(--a);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(200,245,96,.3);flex-shrink:0}
    .nav-fab svg{fill:none;stroke:#0a0a0a;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;width:24px;height:24px}

    /* SCROLL */
    .page-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:max(110px,calc(90px + env(safe-area-inset-bottom)))}
    .page-scroll::-webkit-scrollbar{display:none}
    .main-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}

    /* HEADER */
    .page-header{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between}
    .page-title{font-family:var(--fh);font-size:26px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
    .page-subtitle{font-size:13px;color:var(--t2);margin-top:2px}

    /* CARDS */
    .card{background:var(--bg2);border:.5px solid var(--b1);border-radius:var(--r);padding:18px}
    .section{padding:0 20px;margin-bottom:24px}
    .section-label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--t3);margin-bottom:12px;font-family:var(--fh)}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .stat-card{background:var(--bg3);border:.5px solid var(--b1);border-radius:var(--r);padding:16px}
    .stat-label{font-size:11px;color:var(--t2);margin-bottom:6px}
    .stat-value{font-family:var(--fh);font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.5px}
    .stat-value.ac{color:var(--a)}
    .stat-sub{font-size:11px;color:var(--t3);margin-top:4px}

    /* HERO */
    .hero-card{background:var(--bg2);border:.5px solid var(--b1);border-radius:24px;padding:24px;margin:0 20px 24px;position:relative;overflow:hidden}
    .hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(200,245,96,.06) 0%,transparent 70%);pointer-events:none}
    .hero-label{font-size:12px;color:var(--t2);letter-spacing:.5px;margin-bottom:8px}
    .hero-amt{font-family:var(--fh);font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
    .hero-cur{font-size:20px;color:var(--t2);font-weight:400;margin-right:4px}
    .hero-sub{font-size:12px;color:var(--t3);margin-top:8px}
    .bar-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:14px}
    .bar-fill{height:100%;border-radius:2px;background:var(--a);transition:width .6s}
    .bar-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--t3)}

    /* TX */
    .tx-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:.5px solid var(--b1)}
    .tx-item:last-child{border-bottom:none}
    .tx-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
    .tx-info{flex:1;min-width:0}
    .tx-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-meta{font-size:12px;color:var(--t2);margin-top:2px}
    .tx-amt{font-family:var(--fh);font-size:15px;font-weight:700;color:var(--red);white-space:nowrap}
    .tx-date{font-size:11px;color:var(--t3);text-align:right;margin-top:2px}
    .tx-thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;border:.5px solid var(--b1);flex-shrink:0}

    /* PILLS */
    .pills{display:flex;gap:8px;overflow-x:auto;padding:0 20px;margin-bottom:16px}
    .pills::-webkit-scrollbar{display:none}
    .chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:.5px solid var(--b1);background:var(--bg3);color:var(--t2);white-space:nowrap}
    .chip.on{background:var(--a);color:#0a0a0a;border-color:var(--a)}

    /* FORMS */
    .fg{margin-bottom:18px}
    .fl{font-size:12px;color:var(--t2);margin-bottom:8px;display:block;letter-spacing:.3px}
    .fi{width:100%;background:var(--bg3);border:.5px solid var(--b2);border-radius:var(--rs);padding:13px 16px;font-size:15px;color:var(--t1);font-family:var(--fb);outline:none;transition:border-color .2s;-webkit-appearance:none}
    .fi:focus{border-color:var(--a)}
    .fi::placeholder{color:var(--t3)}
    .btn{width:100%;padding:15px;background:var(--a);color:#0a0a0a;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;font-family:var(--fh);cursor:pointer;transition:all .2s}
    .btn:active{transform:scale(.98)}
    .btn.ghost{background:var(--bg3);color:var(--t1);border:.5px solid var(--b2)}
    .btn.danger{background:var(--redbg);color:var(--red);border:.5px solid rgba(255,77,77,.2)}
    .btn-row{display:flex;gap:10px}
    .btn-row .btn{flex:1}

    /* MODAL centered popup */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{
      width:100%;max-width:420px;
      background:var(--bg2);border-radius:20px;border:.5px solid var(--b2);
      animation:pop .2s ease;
      display:flex;flex-direction:column;
      max-height:calc(100dvh - 40px);
      max-height:calc(100vh - 40px);
      overflow:hidden;
    }
    @keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-body{
      overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
      padding:24px 20px 8px;
    }
    .modal-body::-webkit-scrollbar{display:none}
    .modal-foot{
      flex-shrink:0;
      padding:12px 20px 16px;
      background:var(--bg2);
      border-top:.5px solid var(--b1);
    }
    .modal-handle{display:none}
    .modal-title{font-family:var(--fh);font-size:20px;font-weight:700;margin-bottom:20px}

    /* PROGRESS */
    .prog-wrap{margin-bottom:16px}
    .prog-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
    .prog-name{font-size:14px;font-weight:500}
    .prog-right{text-align:right}
    .prog-spent{font-family:var(--fh);font-size:14px;font-weight:700}
    .prog-bud{font-size:11px;color:var(--t2)}
    .prog-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
    .prog-fill{height:100%;border-radius:3px;transition:width .5s}

    /* WEEK CHART */
    .wchart{display:flex;align-items:flex-end;gap:6px;height:90px;padding:0 4px}
    .wbar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%}
    .wbar-track{width:100%;flex:1;background:var(--bg3);border-radius:6px;position:relative;overflow:hidden;min-height:10px}
    .wbar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:6px;transition:height .6s ease}
    .wday{font-size:10px;color:var(--t3);flex-shrink:0}
    .wday.today{color:var(--a);font-weight:600}

    /* MISC */
    .icon-btn{width:36px;height:36px;border-radius:10px;background:var(--bg3);border:.5px solid var(--b1);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .fxb{display:flex;align-items:center;justify-content:space-between}
    .sync-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px}
    .sync-dot.on{background:var(--a)}
    .sync-dot.spin{background:var(--blue);animation:blink 1s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:.5px solid var(--b2);border-radius:20px;padding:10px 18px;font-size:13px;color:var(--t1);z-index:999;display:flex;align-items:center;gap:8px;animation:td .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
    @keyframes td{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
    .empty{text-align:center;padding:40px 20px;color:var(--t2)}
    .empty-icon{font-size:36px;margin-bottom:10px}
    .camera-zone{width:100%;border-radius:var(--r);border:1.5px dashed var(--b2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;background:var(--bg3);overflow:hidden;position:relative;height:90px}
    .photo-wrap{width:100%;border-radius:var(--r);overflow:hidden;margin-bottom:16px;position:relative}
    .photo-wrap img{width:100%;display:block}
    .photo-rm{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:white;border:none}
    .fi-sm{background:var(--bg3);border:.5px solid var(--b2);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--t1);font-family:var(--fb);outline:none;flex:1}
    .fi-sm:focus{border-color:var(--a)}
    @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade{animation:fi .3s ease forwards}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── CONFIG ────────────────────────────────────────────────────────────
const SB='https://rmakfsanjglskpfxjuxb.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtYWtmc2Fuamdsc2twZnhqdXhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNzMzNDgsImV4cCI6MjA5NTg0OTM0OH0.caR3bxyW95xZ2YibztnV6du-TiRhQHn8ppDBr85yTaM';
const H={'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY};

const db={
  async get(t,q=''){const r=await fetch(`${SB}/rest/v1/${t}?${q}`,{headers:{...H,'Prefer':'return=representation'}});if(!r.ok)throw new Error(await r.text());return r.json()},
  async post(t,b){const r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()},
  async patch(t,id,b){const r=await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()},
  async del(t,id){const r=await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());return true}
};

// ── UTILS ─────────────────────────────────────────────────────────────
const idr=n=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n);
const tod=()=>new Date().toISOString().split('T')[0];
const dayN=d=>['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(d).getDay()];
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const COLORS=['#c8f560','#a8e040','#4d9fff','#0ea5e9','#ff4d4d','#ff7043','#ffb347','#ffd700','#b47fff','#9333ea','#40e0d0','#06b6d4','#ff7eb3','#f43f5e','#7effd4','#34d399','#fb923c','#a78bfa','#38bdf8','#f9a8d4','#86efac','#fca5a5','#c084fc','#67e8f9'];
const EMOJIS=['🏠','🍔','🚗','💊','🎮','✈️','👕','🎓','💼','☕','🛒','🏋️'];
const AVATARS=['😊','👨','👩','🧑','👦','👧','🧔','👱','🙋','🤵','👰','🧕'];

const getSession=()=>{try{return JSON.parse(localStorage.getItem('ts')||'null')}catch{return null}};
const setSession=u=>localStorage.setItem('ts',JSON.stringify(u));
const clearSession=()=>localStorage.removeItem('ts');
const hash=p=>btoa(encodeURIComponent(p+'trackr_salt_2025'));

const getFinanceCoach=({txs,budgets,month,year,prevTotal=0})=>{
  const dayMs=86400000;
  const start=new Date(year,month-1,25);
  const end=new Date(year,month,24);
  const startStr=start.toISOString().split('T')[0];
  const endStr=end.toISOString().split('T')[0];
  const today=new Date();
  const todayOnly=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  const daysInPeriod=Math.round((end-start)/dayMs)+1;
  const rawPassed=Math.floor((todayOnly-start)/dayMs)+1;
  const daysPassed=Math.min(Math.max(rawPassed,1),daysInPeriod);
  const daysLeft=Math.max(daysInPeriod-daysPassed,0);
  const daysLeftInclToday=Math.max(daysInPeriod-daysPassed+1,1);
  const isCurrent=todayOnly>=start&&todayOnly<=end;
  const isFuture=todayOnly<start;
  const periodTx=txs.filter(t=>t.date>=startStr&&t.date<=endStr);
  const total=periodTx.reduce((s,t)=>s+t.amount,0);
  const budgetTarget=budgets.filter(b=>b.type==='monthly').reduce((s,b)=>s+(b.amount||0),0);
  const target=budgetTarget||prevTotal||0;
  const pace=isCurrent&&daysPassed>0?total/daysPassed:0;
  const forecast=isCurrent?Math.round(pace*daysInPeriod):total;
  const remaining=target?target-total:0;
  const safeToday=target?Math.max(0,Math.floor(remaining/daysLeftInclToday)):0;
  const neededCut=target&&isCurrent&&forecast>target?Math.ceil((forecast-target)/daysLeftInclToday):0;
  const status=!target?'no-target':isFuture?'future':!isCurrent?'closed':forecast>target?'over':forecast>target*.9?'tight':'safe';
  return {start,end,startStr,endStr,daysInPeriod,daysPassed,daysLeft,daysLeftInclToday,isCurrent,isFuture,total,target,budgetTarget,forecast,remaining,safeToday,neededCut,status};
};

const getCategoryBrakes=({txs,groups,subCats=[],budgets,month,year})=>{
  const coach=getFinanceCoach({txs,budgets,month,year});
  // Only include budgets relevant to this period:
  // - no date_from/date_to = always active (legacy)
  // - date_from/date_to must overlap with current period
  const monthly=budgets.filter(b=>{
    if(b.type!=='monthly'||!b.amount)return false;
    if(!b.date_from&&!b.date_to)return true; // legacy: no date range, always active
    const bFrom=b.date_from||'0000-01-01';
    const bTo=b.date_to||'9999-12-31';
    // overlap: budget period overlaps with coach period
    return bFrom<=coach.endStr&&bTo>=coach.startStr;
  });
  // Dedupe by group_id: if multiple budgets for same group, pick the one whose date_from is latest (most recent)
  const budgetByGroup={};
  monthly.forEach(b=>{
    const existing=budgetByGroup[b.group_id];
    if(!existing)budgetByGroup[b.group_id]=b;
    else{
      const existFrom=existing.date_from||'0000-01-01';
      const bFrom=b.date_from||'0000-01-01';
      if(bFrom>existFrom)budgetByGroup[b.group_id]=b;
    }
  });
  const deduped=Object.values(budgetByGroup);
  return deduped.map(b=>{
    const g=groups.find(x=>x.id===b.group_id);
    if(!g)return null;
    const sc=b.sub_category_id?groups.find(x=>x.id===b.group_id)&&{id:b.sub_category_id}:null;
    const catTx=txs.filter(t=>{
      if(t.group_id!==g.id||t.date<coach.startStr||t.date>coach.endStr)return false;
      if(b.sub_category_id)return t.sub_category_id===b.sub_category_id;
      return true;
    });
    const spent=catTx.reduce((s,t)=>s+t.amount,0);
    const budget=b.amount||0;
    const remaining=budget-spent;
    const usage=budget?spent/budget:0;
    const pace=coach.isCurrent&&coach.daysPassed>0?spent/coach.daysPassed:0;
    const forecast=coach.isCurrent?Math.round(pace*coach.daysInPeriod):spent;
    const forecastOver=forecast-budget;
    const safePerDay=Math.max(0,Math.floor(remaining/coach.daysLeftInclToday));
    const avgTx=catTx.length?Math.round(spent/catTx.length):0;
    const subCatObj=b.sub_category_id?subCats.find(x=>x.id===b.sub_category_id):null;
    const displayName=subCatObj?`${g.name} / ${subCatObj.name}`:g.name;
    let status='safe';
    if(spent>budget)status='over';
    else if(forecast>budget||usage>=.8)status='brake';
    else if(usage>=.65||(avgTx>0&&safePerDay<avgTx&&remaining>0))status='tight';
    const severity={over:4,brake:3,tight:2,safe:1}[status];
    const score=severity*1000+Math.round(usage*300)+(forecastOver>0?Math.round(forecastOver/10000):0)+(coach.daysLeft>5&&status!=='safe'?80:0);
    const limitText=status==='over'
      ? `Over ${idr(Math.abs(remaining))}. Stop dulu kecuali urgent.`
      : `Limit aman ${idr(safePerDay)}/hari sampai period reset.`;
    const reason=status==='over'
      ? `${displayName} sudah lewat budget.`
      : forecast>budget
        ? `Pace sekarang bisa over ${idr(forecastOver)}.`
        : usage>=.8
          ? `${Math.round(usage*100)}% budget sudah kepake.`
          : status==='tight'
            ? `Sisa ruang mulai sempit.`
            : `Masih on track.`;
    return {group:g,subCategoryId:b.sub_category_id||null,displayName,budget,spent,remaining,usage,forecast,forecastOver,safePerDay,avgTx,status,score,reason,limitText,txCount:catTx.length};
  }).filter(Boolean).sort((a,b)=>b.score-a.score);
};

function Login({onLogin}){
  const [u,setU]=useState('');
  const [p,setP]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [show,setShow]=useState(false);

  const go=async()=>{
    if(!u.trim()||!p){setErr('Fill in all fields');return}
    setLoading(true);setErr('');
    try{
      const rows=await db.get('users',`username=eq.${encodeURIComponent(u.trim().toLowerCase())}&select=*`);
      if(!rows.length){setErr('Username not found');setLoading(false);return}
      const row=rows[0];
      if(row.password!==hash(p)){setErr('Wrong password');setLoading(false);return}

        <span className="sync-dot on"/>Cloud synced

  );
}

// ── PIE CHART ────────────────────────────────────────────────────────
function PieChart({data,groups,total}){
  const [showRp,setShowRp]=useState(false);
  const [hovered,setHovered]=useState(null);

  if(!total||Object.keys(data).length===0) return(
    <div className="card" style={{textAlign:'center',padding:32,color:'var(--t3)',fontSize:13}}>No data this period</div>
  );

  // Build slices
  const slices=[];
  let cumAngle=0;
  const entries=Object.entries(data).sort((a,b)=>b[1]-a[1]);
  entries.forEach(([gid,amt])=>{
    const g=groups.find(x=>x.id===gid);
    const pct=amt/total;
    const angle=pct*360;
    slices.push({gid,amt,pct,angle,startAngle:cumAngle,color:g?.color||'#888',name:g?.name||'Other',emoji:g?.emoji||'💰'});
    cumAngle+=angle;
  });

  // SVG arc path helper
  const arc=(cx,cy,r,startDeg,endDeg)=>{
    const toRad=d=>d*Math.PI/180;
    const x1=cx+r*Math.sin(toRad(startDeg));
    const y1=cy-r*Math.cos(toRad(startDeg));
    const x2=cx+r*Math.sin(toRad(endDeg));
    const y2=cy-r*Math.cos(toRad(endDeg));
    const large=endDeg-startDeg>180?1:0;
    return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
  };

  const active=hovered!=null?slices[hovered]:null;

  return(
    <div className="card">
      <svg viewBox="0 0 200 200" width="100%" style={{maxWidth:220,display:'block',margin:'0 auto',cursor:'pointer'}}
        onClick={()=>setShowRp(v=>!v)}>
        {slices.map((s,i)=>{
          const isActive=hovered===i;
          const scale=isActive?1.04:1;
          return(
            <path key={s.gid}
              d={arc(100,100,isActive?88:82,s.startAngle,s.startAngle+s.angle-(slices.length>1?1:0))}
              fill={s.color}
              opacity={hovered!=null&&!isActive?0.45:1}
              style={{transition:'all .2s',cursor:'pointer'}}
              onMouseEnter={()=>setHovered(i)}
              onMouseLeave={()=>setHovered(null)}
              onTouchStart={()=>setHovered(hovered===i?null:i)}
            />
          );
        })}
        {/* Center label */}
        <circle cx="100" cy="100" r="46" fill="var(--bg2)"/>
        {active?(
          <>
            <text x="100" y="93" textAnchor="middle" fontSize="18" fill="white">{active.emoji}</text>
            <text x="100" y="108" textAnchor="middle" fontSize="9" fill="var(--t2)" fontFamily="DM Sans">{active.name}</text>
            <text x="100" y="122" textAnchor="middle" fontSize="11" fill={active.color} fontWeight="700" fontFamily="Syne">
              {showRp?`Rp${Math.round(active.amt/1000)}K`:`${(active.pct*100).toFixed(1)}%`}
            </text>
          </>
        ):(
          <>
            <text x="100" y="97" textAnchor="middle" fontSize="10" fill="var(--t2)" fontFamily="DM Sans">{showRp?"Total":"Category"}</text>
            <text x="100" y="113" textAnchor="middle" fontSize="12" fill="var(--t1)" fontWeight="700" fontFamily="Syne">
              {showRp?`Rp${Math.round(total/1000)}K`:`${entries.length} items`}
            </text>
          </>
        )}
      </svg>
      {/* Tap hint */}
      <div style={{textAlign:'center',fontSize:11,color:'var(--t3)',marginTop:4,marginBottom:8}}>
        Tap chart to toggle {showRp?"Rp":"%"}
      </div>
      {/* Legend */}
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {slices.map((s,i)=>(
          <div key={s.gid} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',opacity:hovered!=null&&hovered!==i?0.45:1,transition:'opacity .2s'}}
            onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
            onTouchStart={()=>setHovered(hovered===i?null:i)}>
            <div style={{width:10,height:10,borderRadius:'50%',background:s.color,flexShrink:0}}/>
            <div style={{flex:1,fontSize:13,color:'var(--t1)'}}>{s.emoji} {s.name}</div>
            <div style={{fontSize:13,fontFamily:'var(--fh)',fontWeight:700,color:s.color}}>
              {idr(s.amt)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

          <div style={{marginTop:10,display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:12,color:'var(--t2)'}}>Week total</span>
            <span style={{fontFamily:'var(--fh)',fontSize:15,fontWeight:700,color:'var(--a)'}}>{idr(wTotal)}</span>
          </div>
        </div>
      </div>

      {groups.length>0&&(
        <div className="section">
          <div className="section-label">Monthly Budget Progress</div>
          <div className="card">
            {groups.map(g=>{
              const b=budgets.find(x=>x.group_id===g.id&&x.type==='monthly');
              if(!b)return null;
              const spent=byG[g.id]||0;
              const budget=b.amount||0;
              const pct=budget?Math.min((spent/budget)*100,100):0;
              const st=!budget?'n':pct>90?'o':pct>70?'w':'s';
              return(
                <div key={g.id} className="prog-wrap">
                  <div className="prog-hd">
                    <div className="prog-name">{g.emoji} {g.name}</div>
                    <div className="prog-right"><div className="prog-spent">{idr(spent)}</div><div className="prog-bud">{budget?`of ${idr(budget)}`:'no budget'}</div></div>
                  </div>
                  {budget>0&&(
                    <>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                        <div className="prog-track" style={{flex:1,marginRight:8}}>
                          <div className="prog-fill" style={{width:`${pct}%`,background:st==='o'?'#ff4d4d':st==='w'?'#ffb347':g.color}}/>
                        </div>
                        <span style={{fontSize:11,fontWeight:600,color:st==='o'?'#ff4d4d':st==='w'?'#ffb347':'var(--a)',flexShrink:0}}>{pct.toFixed(0)}%</span>
                      </div>
                      {st==='o'&&<div style={{fontSize:11,color:'#ff4d4d',marginTop:2}}>⚠️ Over budget!</div>}
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Payment Source Totals */}
      {sources.length>0&&(
        <div className="section">
          <div className="section-label">Monthly by Payment Source</div>
          <div className="card" style={{padding:'4px 18px'}}>
            {sources.map(src=>{
              const total=mTx.filter(t=>t.source_id===src.id).reduce((s,t)=>s+t.amount,0);
              if(!total)return null;
              const pct=mTotal?Math.round((total/mTotal)*100):0;
              return(
                <div key={src.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'.5px solid var(--b1)'}}>
                  <div style={{width:38,height:38,borderRadius:10,background:'var(--bg3)',border:'.5px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{src.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:500}}>{src.name}</div>
                    <div style={{marginTop:5,height:4,borderRadius:2,background:'var(--bg4)',overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${pct}%`,background:'var(--a)',borderRadius:2,transition:'width .5s'}}/>
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700,color:'var(--t1)'}}>{idr(total)}</div>
                    <div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{pct}% of total</div>
                  </div>
                </div>
              );
            })}
            {mTx.filter(t=>!t.source_id).reduce((s,t)=>s+t.amount,0)>0&&(()=>{
              const uncat=mTx.filter(t=>!t.source_id).reduce((s,t)=>s+t.amount,0);
              const pct=mTotal?Math.round((uncat/mTotal)*100):0;
              return(
                <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0'}}>
                  <div style={{width:38,height:38,borderRadius:10,background:'var(--bg3)',border:'.5px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>❓</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:500,color:'var(--t2)'}}>Unassigned</div>
                    <div style={{marginTop:5,height:4,borderRadius:2,background:'var(--bg4)',overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${pct}%`,background:'var(--t3)',borderRadius:2}}/>
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700,color:'var(--t2)'}}>{idr(uncat)}</div>
                    <div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{pct}% of total</div>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      <div className="section">
        <div className="fxb" style={{marginBottom:10}}><div className="section-label" style={{margin:0}}>Recent Transactions</div></div>
        <div style={{display:'flex',gap:8,overflowX:'auto',marginBottom:12}}>
          <div className={`chip ${fg==='all'?'on':''}`} onClick={()=>setFg('all')}>All</div>
          {groups.map(g=><div key={g.id} className={`chip ${fg===g.id?'on':''}`} onClick={()=>setFg(g.id)} style={{flexShrink:0}}>{g.emoji} {g.name}</div>)}
        </div>
        <div className="card" style={{padding:'4px 18px'}}>
          {recent.length===0?<div className="empty"><div className="empty-icon">💸</div><div>No transactions yet</div></div>:
            recent.map(t=>{const g=groups.find(x=>x.id===t.group_id);return(
              <div key={t.id} className="tx-item">
                <div className="tx-icon" style={{background:`${g?.color||'#888'}20`}}>{g?.emoji||'💰'}</div>
                <div className="tx-info"><div className="tx-name">{t.description}</div><div className="tx-meta">{g?.name} - {new Date(t.date).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}{t.created_by?' by '+t.created_by:''}</div></div>
                {t.photo&&<img src={t.photo} alt="" className="tx-thumb"/>}
                <div style={{textAlign:'right'}}>
                  <div className="tx-amt">-{idr(t.amount)}</div>
                  <div style={{display:'flex',gap:6,justifyContent:'flex-end',marginTop:4}}>
                    <button onClick={()=>onEditTx(t)} style={{background:'none',border:'none',color:'var(--t2)',cursor:'pointer',fontSize:12,padding:0}}>✏️</button>
                  </div>
                </div>
              </div>
            );})}
        </div>
        {txs.length>lim&&<button className="btn ghost" style={{marginTop:10,fontSize:13}} onClick={()=>setLim(v=>v+5)}>Load more ({txs.length-lim} remaining)</button>}
      </div>
    </div>
  );
})

// ── HISTORY ───────────────────────────────────────────────────────────
const History=React.memo(function History({txs,groups,subCats,sources,onDelete,onEdit}){
  const [fg,setFg]=useState('all');
  const [fsub,setFsub]=useState('all');
  const [fsrc,setFsrc]=useState('all');
  const [q,setQ]=useState('');
  const [dir,setDir]=useState('desc');
  const [dateFrom,setDateFrom]=useState('');
  const [dateTo,setDateTo]=useState('');
  const [amtMin,setAmtMin]=useState('');
  const [amtMax,setAmtMax]=useState('');
  const [showFilter,setShowFilter]=useState(false);

  const parseAmt=v=>v.replace(/[^0-9]/g,'');

  const list=useMemo(()=>{
    let a=[...txs];
    if(fg!=='all')a=a.filter(t=>t.group_id===fg);
    if(fsub!=='all')a=a.filter(t=>t.sub_category_id===fsub);
    if(fsrc!=='all')a=a.filter(t=>t.source_id===fsrc);
    if(q)a=a.filter(t=>t.description.toLowerCase().includes(q.toLowerCase()));
    if(dateFrom)a=a.filter(t=>t.date>=dateFrom);
    if(dateTo)a=a.filter(t=>t.date<=dateTo);
    if(amtMin)a=a.filter(t=>t.amount>=parseInt(amtMin));
    if(amtMax)a=a.filter(t=>t.amount<=parseInt(amtMax));
    a.sort((a,b)=>dir==='desc'?b.date.localeCompare(a.date):a.date.localeCompare(b.date));
    return a;
  },[txs,fg,fsub,fsrc,q,dir,dateFrom,dateTo,amtMin,amtMax]);

  const filteredTotal=useMemo(()=>list.reduce((s,t)=>s+t.amount,0),[list]);

  // Week grouping (Mon-Sun)
  const getWeekKey=(dateStr)=>{
    const d=new Date(dateStr);const day=d.getDay();
    const diff=(day===0?-6:1)-day;
    const mon=new Date(d);mon.setDate(d.getDate()+diff);
    return mon.toISOString().split('T')[0];
  };
  const getWeekLabel=(monStr)=>{
    const mon=new Date(monStr);const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    const fmt=d=>d.toLocaleDateString('id-ID',{day:'numeric',month:'short'});
    return `${fmt(mon)} - ${fmt(sun)}`;
  };
  const grouped=useMemo(()=>{
    const map={};
    list.forEach(t=>{const wk=getWeekKey(t.date);if(!map[wk])map[wk]={key:wk,label:getWeekLabel(wk),txs:[],total:0};map[wk].txs.push(t);map[wk].total+=t.amount;});
    return Object.values(map).sort((a,b)=>dir==='desc'?b.key.localeCompare(a.key):a.key.localeCompare(b.key));
  },[list,dir]);

  // Date presets
  const applyPreset=(preset)=>{
    const now=new Date();const today=now.toISOString().split('T')[0];
    if(preset==='week'){
      const d=new Date();const day=d.getDay();const diff=(day===0?-6:1)-day;
      const mon=new Date(d);mon.setDate(d.getDate()+diff);
      setDateFrom(mon.toISOString().split('T')[0]);setDateTo(today);
    } else if(preset==='month'){
      const s=new Date(now.getFullYear(),now.getMonth()-1,25).toISOString().split('T')[0];
      setDateFrom(s);setDateTo(today);
    } else if(preset==='30d'){
      const d=new Date();d.setDate(d.getDate()-30);
      setDateFrom(d.toISOString().split('T')[0]);setDateTo(today);
    }
  };

  const activeFilters=[];
  if(fg!=='all'){const g=groups.find(x=>x.id===fg);activeFilters.push({label:`${g?.emoji||''} ${g?.name||''}`,clear:()=>{setFg('all');setFsub('all')}});}
  if(fsub!=='all'){const s=subCats.find(x=>x.id===fsub);activeFilters.push({label:s?.name||'',clear:()=>setFsub('all')});}
  if(fsrc!=='all'){const s=sources.find(x=>x.id===fsrc);activeFilters.push({label:`${s?.icon||'💳'} ${s?.name||''}`,clear:()=>setFsrc('all')});}
  if(dateFrom||dateTo){activeFilters.push({label:`${dateFrom?new Date(dateFrom).toLocaleDateString('id-ID',{day:'numeric',month:'short'}):'...'} - ${dateTo?new Date(dateTo).toLocaleDateString('id-ID',{day:'numeric',month:'short'}):'...'}`,clear:()=>{setDateFrom('');setDateTo('')}});}
  if(amtMin||amtMax){activeFilters.push({label:`${amtMin?idr(parseInt(amtMin)):'0'} - ${amtMax?idr(parseInt(amtMax)):'∞'}`,clear:()=>{setAmtMin('');setAmtMax('')}});}
  if(q){activeFilters.push({label:`"${q}"`,clear:()=>setQ('')});}

  const resetAll=()=>{setFg('all');setFsub('all');setFsrc('all');setQ('');setDateFrom('');setDateTo('');setAmtMin('');setAmtMax('');};
  const subsForFg=fg!=='all'?subCats.filter(s=>s.group_id===fg):[];

  return(
    <div className="page-scroll" style={{paddingBottom:'calc(140px + env(safe-area-inset-bottom,0px))'}}>
      <div className="page-header">
        <div><div className="page-title">History</div><div className="page-subtitle">{list.length} records · {idr(filteredTotal)}</div></div>
        <div className="icon-btn" onClick={()=>setDir(d=>d==='desc'?'asc':'desc')}><Ic n="filt" s={18}/></div>
      </div>

      {/* Active filter chips */}
      {activeFilters.length>0&&(
        <div style={{display:'flex',gap:6,flexWrap:'wrap',padding:'0 20px',marginBottom:12}}>
          {activeFilters.map((f,i)=>(
            <div key={i} onClick={f.clear} style={{display:'inline-flex',alignItems:'center',gap:5,background:'var(--abg)',border:'.5px solid var(--a)',borderRadius:20,padding:'5px 10px',fontSize:11,color:'var(--a)',cursor:'pointer'}}>
              {f.label}<span style={{fontSize:13,lineHeight:1}}>✕</span>
            </div>
          ))}
          <div onClick={resetAll} style={{display:'inline-flex',alignItems:'center',background:'var(--bg3)',border:'.5px solid var(--b1)',borderRadius:20,padding:'5px 10px',fontSize:11,color:'var(--t2)',cursor:'pointer'}}>Reset all</div>
        </div>
      )}

      <div className="section">
        {grouped.length===0?(
          <div className="empty">
            <div className="empty-icon">🔍</div>
            <div>No transactions found</div>
            {activeFilters.length>0&&<button onClick={resetAll} className="btn ghost" style={{marginTop:16,width:'auto',padding:'8px 20px'}}>Clear filters</button>}
          </div>
        ):(
          grouped.map(wk=>(
            <div key={wk.key} style={{marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--t3)',letterSpacing:'0.8px',textTransform:'uppercase'}}>{wk.label}</div>
                <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700,color:'var(--a)'}}>{idr(wk.total)}</div>
              </div>
              <div className="card" style={{padding:'4px 18px'}}>
                {wk.txs.map(t=>{const g=groups.find(x=>x.id===t.group_id);const sub=subCats.find(s=>s.id===t.sub_category_id);return(
                  <div key={t.id} className="tx-item">
                    <div className="tx-icon" style={{background:`${g?.color||'#888'}20`}}>{g?.emoji||'💰'}</div>
                    <div className="tx-info">
                      <div className="tx-name">{t.description}</div>
                      <div className="tx-meta">{g?.name}{sub?' · '+sub.name:''} · {new Date(t.date).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}{t.created_by?' by '+t.created_by:''}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div className="tx-amt">-{idr(t.amount)}</div>
                      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
                        <button onClick={()=>onEdit(t)} style={{background:'none',border:'none',color:'var(--t2)',cursor:'pointer',fontSize:12,padding:0}}>✏️</button>
                        <button onClick={()=>onDelete(t.id)} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:12,padding:0}}>🗑</button>
                      </div>
                    </div>
                  </div>
                );})}
              </div>
            </div>
          ))
        )}
      </div>

      {/* Bottom floating search + filter bar */}
      <div style={{position:'fixed',left:0,right:0,bottom:'calc(68px + env(safe-area-inset-bottom,0px))',padding:'0 16px',zIndex:40,pointerEvents:'none'}}>
        <div style={{display:'flex',gap:8,maxWidth:540,margin:'0 auto',pointerEvents:'auto'}}>
          <input className="fi" placeholder="Search transactions..." value={q} onChange={e=>setQ(e.target.value)}
            style={{flex:1,boxShadow:'0 4px 20px rgba(0,0,0,0.4)',background:'var(--bg2)',border:'.5px solid var(--b2)'}}/>
          <button onClick={()=>setShowFilter(true)} style={{position:'relative',width:48,flexShrink:0,borderRadius:12,background:activeFilters.length?'var(--a)':'var(--bg2)',border:`.5px solid ${activeFilters.length?'var(--a)':'var(--b2)'}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 4px 20px rgba(0,0,0,0.4)'}}>
            <Ic n="filt" s={20} c={activeFilters.length?'#0a0a0a':'var(--t1)'}/>
            {activeFilters.length>0&&<span style={{position:'absolute',top:-4,right:-4,background:'#ff4d4d',color:'white',borderRadius:'50%',width:18,height:18,fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{activeFilters.length}</span>}
          </button>
        </div>
      </div>

      {/* Filter bottom sheet */}
      {showFilter&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowFilter(false)} style={{alignItems:'flex-end'}}>
          <div className="modal" style={{maxHeight:'85dvh',borderRadius:'20px 20px 0 0',width:'100%',maxWidth:540}}>
            <div className="modal-body">
              <div className="modal-handle"/>
              <div className="fxb" style={{marginBottom:16}}>
                <div className="modal-title" style={{margin:0}}>Filters</div>
                <button onClick={resetAll} style={{background:'none',border:'none',color:'var(--a)',fontSize:13,cursor:'pointer'}}>Reset</button>
              </div>

              {/* Quick date presets */}
              <div className="fg">
                <label className="fl">Quick range</label>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  <div className="chip" onClick={()=>applyPreset('week')}>This week</div>
                  <div className="chip" onClick={()=>applyPreset('month')}>This month</div>
                  <div className="chip" onClick={()=>applyPreset('30d')}>Last 30 days</div>
                </div>
              </div>

              {/* Date range */}
              <div className="fg">
                <label className="fl">Date range</label>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input type="date" className="fi" style={{flex:1,padding:'10px',fontSize:13}} value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
                  <span style={{color:'var(--t3)'}}>-</span>
                  <input type="date" className="fi" style={{flex:1,padding:'10px',fontSize:13}} value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
                </div>
              </div>

              {/* Category */}
              <div className="fg">
                <label className="fl">Category</label>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <div className={`chip ${fg==='all'?'on':''}`} onClick={()=>{setFg('all');setFsub('all')}}>All</div>
                  {groups.map(g=><div key={g.id} className={`chip ${fg===g.id?'on':''}`} onClick={()=>{setFg(g.id);setFsub('all')}}>{g.emoji} {g.name}</div>)}
                </div>
              </div>

              {/* Sub-category (cascading) */}
              {subsForFg.length>0&&(
                <div className="fg">
                  <label className="fl">Sub Category</label>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    <div className={`chip ${fsub==='all'?'on':''}`} onClick={()=>setFsub('all')}>All</div>
                    {subsForFg.map(s=><div key={s.id} className={`chip ${fsub===s.id?'on':''}`} onClick={()=>setFsub(s.id)}>{s.name}</div>)}
                  </div>
                </div>
              )}

              {/* Amount range */}
              <div className="fg">
                <label className="fl">Amount range (IDR)</label>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input className="fi" inputMode="numeric" placeholder="Min" style={{flex:1,padding:'10px',fontSize:13}} value={amtMin?parseInt(amtMin).toLocaleString('id-ID'):''} onChange={e=>setAmtMin(parseAmt(e.target.value))}/>
                  <span style={{color:'var(--t3)'}}>-</span>
                  <input className="fi" inputMode="numeric" placeholder="Max" style={{flex:1,padding:'10px',fontSize:13}} value={amtMax?parseInt(amtMax).toLocaleString('id-ID'):''} onChange={e=>setAmtMax(parseAmt(e.target.value))}/>
                </div>
              </div>

              {/* Payment Source */}
              {sources.length>0&&(
                <div className="fg">
                  <label className="fl">Payment Source</label>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    <div className={`chip ${fsrc==='all'?'on':''}`} onClick={()=>setFsrc('all')}>All</div>
                    {sources.map(s=><div key={s.id} className={`chip ${fsrc===s.id?'on':''}`} onClick={()=>setFsrc(s.id)}>{s.icon} {s.name}</div>)}
                  </div>
                </div>
              )}

              {/* Sort */}
              <div className="fg">
                <label className="fl">Sort</label>
                <div style={{display:'flex',gap:6}}>
                  <div className={`chip ${dir==='desc'?'on':''}`} onClick={()=>setDir('desc')}>Newest first</div>
                  <div className={`chip ${dir==='asc'?'on':''}`} onClick={()=>setDir('asc')}>Oldest first</div>
                </div>
              </div>
            </div>
            <div className="modal-foot">
              <div className="btn-row">
                <button className="btn" onClick={()=>setShowFilter(false)}>Show {list.length} results</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
})

// ── MASTER ────────────────────────────────────────────────────────────

  const [bSubId,setBSubId]=useState('');
  // user form
  const [showUsr,setShowUsr]=useState(false);

  const [uDisp,setUDisp]=useState('');
  const [uPass,setUPass]=useState('');
  const [uAv,setUAv]=useState('😊');
  const [uErr,setUErr]=useState('');
  // source form
  const [showSrc,setShowSrc]=useState(false);
  const [editSrc,setEditSrc]=useState(null);
  const [srcName,setSrcName]=useState('');
  const [srcIcon,setSrcIcon]=useState('💳');
  // sub category form
  const [showSub,setShowSub]=useState(false);
  const [editSub,setEditSub]=useState(null);
  const [subName,setSubName]=useState('');
  const [subGid,setSubGid]=useState('');
  // sub cats inside category modal
  const [gSubInput,setGSubInput]=useState('');
  const [gSubList,setGSubList]=useState([]);

  const [toast,setToast]=useState(null);
  const showT=useCallback((msg,icon='✓')=>{setToast({msg,icon});setTimeout(()=>setToast(null),2500)},[]);

  const SOURCE_ICONS = ['💳','🏦','💵','📱','🏧','💰','🪙','🎫'];

  // Sources CRUD
  const openAddSrc=()=>{setEditSrc(null);setSrcName('');setSrcIcon('💳');setShowSrc(true)};
  const openEditSrc=(s)=>{setEditSrc(s);setSrcName(s.name);setSrcIcon(s.icon);setShowSrc(true)};
  const saveSrc=async()=>{
    if(!srcName.trim())return;setSaving(true);
    try{
      if(editSrc){
        const u={...editSrc,name:srcName.trim(),icon:srcIcon};
        await db.patch('sources',editSrc.id,u);setSources(ss=>ss.map(x=>x.id===editSrc.id?u:x));showT('Source updated');
      } else {
        const s={id:'s'+Date.now(),name:srcName.trim(),icon:srcIcon};
        await db.post('sources',s);setSources(ss=>[...ss,s]);showT('Source added');
      }
      setShowSrc(false);setEditSrc(null);setSrcName('');
    }catch{showT('Failed','⚠️')}
    setSaving(false);
  };
  const delSrc=async(id)=>{try{await db.del('sources',id);setSources(ss=>ss.filter(x=>x.id!==id));showT('Deleted','🗑')}catch{showT('Failed','⚠️')}};

  // Sub Categories CRUD
  const openAddSub=()=>{setEditSub(null);setSubName('');setSubGid(groups[0]?.id||'');setShowSub(true)};
  const openAddSubForGroup=(gid)=>{setEditSub(null);setSubName('');setSubGid(gid);setShowSub(true)};
  const openEditSub=(s)=>{setEditSub(s);setSubName(s.name);setSubGid(s.group_id);setShowSub(true)};
  const saveSub=async()=>{
    if(!subName.trim()||!subGid)return;setSaving(true);
    try{
      if(editSub){
        const u={...editSub,name:subName.trim(),group_id:subGid};
        await db.patch('sub_categories',editSub.id,u);setSubCats(ss=>ss.map(x=>x.id===editSub.id?u:x));showT('Sub category updated');
      } else {
        const s={id:'sc'+Date.now(),name:subName.trim(),group_id:subGid};
        await db.post('sub_categories',s);setSubCats(ss=>[...ss,s]);showT('Sub category added');
      }
      setShowSub(false);setEditSub(null);setSubName('');
    }catch{showT('Failed','⚠️')}
    setSaving(false);
  };
  const delSub=async(id)=>{try{await db.del('sub_categories',id);setSubCats(ss=>ss.filter(x=>x.id!==id));showT('Deleted','🗑')}catch{showT('Failed','⚠️')}};

  useEffect(()=>{if(tab==='users')loadUsers()},[tab]);
  const loadUsers=async()=>{try{const u=await db.get('users','select=id,username,display_name,avatar&order=created_at.asc');setUsers(u)}catch{}};

  const openAddGrp=()=>{setEditGrp(null);setGName('');setGEmoji('🏠');setGColor(COLORS[0]);setGSubList([]);setGSubInput('');setShowGrp(true)};
  const openEditGrpFn=(g)=>{
    setEditGrp(g);setGName(g.name);setGEmoji(g.emoji);setGColor(g.color);
    setGSubList(subCats.filter(s=>s.group_id===g.id));
    setGSubInput('');setShowGrp(true);
  };
  const addGrp=async()=>{
    if(!gName.trim())return;setSaving(true);
    try{
      let gId;
      if(editGrp){
        const upd={...editGrp,name:gName.trim(),emoji:gEmoji,color:gColor};
        await db.patch('groups',editGrp.id,upd);setGroups(gs=>gs.map(x=>x.id===editGrp.id?upd:x));
        gId=editGrp.id;showT('Category updated');
      } else {
        const g={id:'g'+Date.now(),user_id:currentUser.id,name:gName.trim(),emoji:gEmoji,color:gColor};
        await db.post('groups',g);setGroups(gs=>[...gs,g]);
        gId=g.id;showT('Category added');
      }
      // save new sub cats (ones without id yet)
      const newSubs=gSubList.filter(s=>s._new);
      for(const s of newSubs){
        const sub={id:'sc'+Date.now()+Math.random().toString(36).slice(2),name:s.name,group_id:gId};
        await db.post('sub_categories',sub);
        setSubCats(ss=>[...ss,sub]);
      }
      // delete removed subs (ones marked _del)
      const delSubs=gSubList.filter(s=>s._del&&!s._new);
      for(const s of delSubs){
        await db.del('sub_categories',s.id);
        setSubCats(ss=>ss.filter(x=>x.id!==s.id));
      }
      setGName('');setShowGrp(false);setEditGrp(null);setGSubList([]);setGSubInput('');
    }catch{showT('Failed','⚠️')}
    setSaving(false);
  };
  const delGrp=async(id)=>{try{await db.del('groups',id);setGroups(gs=>gs.filter(x=>x.id!==id));showT('Deleted','🗑')}catch{showT('Failed','⚠️')}};

  const saveBud=async()=>{
    if(!bGid||!bAmt)return;setSaving(true);
    try{
      const e={id:editBud?.id||'b'+Date.now(),user_id:currentUser.id,group_id:bGid,sub_category_id:bSubId||null,amount:parseInt(bAmt.replace(/[^0-9]/g,'')||'0'),type:bType,date_from:bFrom,date_to:bTo};
      if(editBud){await db.patch('budgets',editBud.id,e);setBudgets(bs=>bs.map(b=>b.id===editBud.id?e:b))}
      else{await db.post('budgets',e);setBudgets(bs=>[...bs,e])}
      setShowBud(false);setEditBud(null);setBAmt('');setBGid('');setBSubId('');showT('Budget saved');
    }catch{showT('Failed','⚠️')}
    setSaving(false);
  };
  const delBud=async(id)=>{try{await db.del('budgets',id);setBudgets(bs=>bs.filter(b=>b.id!==id));showT('Deleted','🗑')}catch{showT('Failed','⚠️')}};
  const openEditBud=(b)=>{setEditBud(b);setBGid(b.group_id);setBSubId(b.sub_category_id||'');setBAmt(String(b.amount));setBType(b.type);setBFrom(b.date_from||'');setBTo(b.date_to||'');setShowBud(true)};

  const openAddUsr=()=>{setEditUsr(null);setUName('');setUDisp('');setUPass('');setUAv('😊');setUErr('');setShowUsr(true)};
  const openEditUsrFn=(u)=>{setEditUsr(u);setUName(u.username);setUDisp(u.display_name);setUPass('');setUAv(u.avatar);setUErr('');setShowUsr(true)};
  const addUsr=async()=>{
    setUErr('');
    if(editUsr){
      // edit mode - password optional
      if(!uDisp.trim()){setUErr('Display name required');return}
      setSaving(true);
      try{
        const upd={display_name:uDisp.trim(),avatar:uAv};
        if(uPass.length>=4) upd.password=hash(uPass);
        await db.patch('users',editUsr.id,upd);
        loadUsers();setShowUsr(false);setEditUsr(null);showT('User updated');
      }catch{showT('Failed','⚠️')}
      setSaving(false);
    } else {
      if(!uName.trim()||!uPass||!uDisp.trim()){setUErr('All fields required');return}
      if(uPass.length<4){setUErr('Password min. 4 chars');return}
      setSaving(true);
      try{
        const ex=await db.get('users',`username=eq.${encodeURIComponent(uName.trim().toLowerCase())}&select=id`);
        if(ex.length){setUErr('Username taken');setSaving(false);return}
        const u={id:'u'+Date.now(),username:uName.trim().toLowerCase(),display_name:uDisp.trim(),password:hash(uPass),avatar:uAv};
        await db.post('users',u);
        setUName('');setUDisp('');setUPass('');setUAv('😊');setShowUsr(false);loadUsers();showT('User registered');
      }catch{showT('Failed','⚠️')}
      setSaving(false);
    }
  };
  const delUsr=async(id)=>{if(id===currentUser.id)return;try{await db.del('users',id);loadUsers();showT('Deleted','🗑')}catch{showT('Failed','⚠️')}};

  return(
    <div className="page-scroll">
      {toast&&<Toast msg={toast.msg} icon={toast.icon}/>}
      <div className="page-header"><div><div className="page-title">Master</div><div className="page-subtitle">Manage categories &amp; budgets</div></div></div>
      <div style={{display:'flex',gap:6,padding:'0 20px',marginBottom:12,flexWrap:'wrap'}}>
        {[['groups','📂 Cat.'],['sources','💳 Source'],['budgets','💰 Budget'],['users','👥 Users']].map(([t,label])=>(
          <button key={t} onClick={()=>setTab(t)} className={`btn ${tab===t?'':'ghost'}`} style={{flex:'1 0 auto',padding:'9px 8px',fontSize:11}}>
            {label}
          </button>
        ))}
      </div>

      {tab==='groups'&&(
        <div className="section">
          <button className="btn" style={{marginBottom:16}} onClick={openAddGrp}>+ Add Category</button>
          {groups.map(g=>{
            const subs=subCats.filter(s=>s.group_id===g.id);
            return(
              <div key={g.id} className="card" style={{marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:14}}>
                  <div style={{width:44,height:44,borderRadius:12,background:`${g.color}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{g.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:500,fontSize:15}}>{g.name}</div>
                    <div style={{width:60,height:4,borderRadius:2,background:g.color,marginTop:4}}/>
                  </div>
                  <div style={{display:'flex',gap:4}}>
                    <button onClick={()=>openEditGrpFn(g)} style={{background:'none',border:'none',color:'var(--t2)',cursor:'pointer',fontSize:16,padding:4}}>✏️</button>
                    <button onClick={()=>delGrp(g.id)} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:16,padding:4}}>🗑</button>
                  </div>
                </div>
                {subs.length>0&&(
                  <div style={{marginTop:10,paddingTop:10,borderTop:'.5px solid var(--b1)',display:'flex',flexWrap:'wrap',gap:6}}>
                    {subs.map(s=>(
                      <div key={s.id} style={{display:'flex',alignItems:'center',gap:4,background:'var(--bg3)',border:`.5px solid var(--b1)`,borderRadius:20,padding:'4px 10px',fontSize:12}}>
                        <span style={{color:'var(--t2)'}}>{s.name}</span>
                        <button onClick={()=>openEditSub(s)} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:11,padding:'0 2px'}}>✏️</button>
                        <button onClick={()=>delSub(s.id)} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:11,padding:'0 2px'}}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
                <button onClick={()=>openAddSubForGroup(g.id)} style={{marginTop:8,background:'none',border:'.5px dashed var(--b2)',borderRadius:20,padding:'4px 12px',fontSize:11,color:'var(--t3)',cursor:'pointer',width:'100%'}}>
                  + Add sub category
                </button>
              </div>
            );
          })}
          {groups.length===0&&<div className="empty"><div className="empty-icon">📂</div><div>No categories yet</div></div>}
        </div>
      )}

      {tab==='budgets'&&(
        <div className="section">
          <button className="btn" style={{marginBottom:16}} onClick={()=>{setEditBud(null);setBAmt('');setBGid(groups[0]?.id||'');setShowBud(true)}}>+ Set Budget</button>
          {budgets.map(b=>{const g=groups.find(x=>x.id===b.group_id);const sc=subCats.find(x=>x.id===b.sub_category_id);return(
            <div key={b.id} className="card" style={{marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:20}}>{g?.emoji||'💰'}</span>
                  <div>
                    <div style={{fontWeight:500,fontSize:14}}>{g?.name||'Unknown'}{sc&&<span style={{fontWeight:400,color:'var(--t2)',fontSize:13}}> / {sc.name}</span>}</div>
                    <div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{b.type==='weekly'?'Weekly':'Monthly'} | {b.date_from} - {b.date_to}</div>
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'var(--fh)',fontSize:15,fontWeight:700,color:'var(--a)'}}>{idr(b.amount)}</div>
                  <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
                    <button onClick={()=>openEditBud(b)} style={{background:'none',border:'none',color:'var(--t2)',cursor:'pointer',fontSize:12}}>✏️</button>
                    <button onClick={()=>delBud(b.id)} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:12}}>🗑</button>
                  </div>
                </div>
              </div>
            </div>
          );})}
          {budgets.length===0&&<div className="empty"><div className="empty-icon">💰</div><div>No budgets set</div></div>}
        </div>
      )}

      {tab==='sources'&&(
        <div className="section">
          <button className="btn" style={{marginBottom:16}} onClick={openAddSrc}>+ Add Payment Source</button>
          {sources.map(s=>(
            <div key={s.id} className="card" style={{display:'flex',alignItems:'center',gap:14,marginBottom:10}}>
              <div style={{width:44,height:44,borderRadius:12,background:'var(--bg3)',border:'.5px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>{s.icon}</div>
              <div style={{flex:1}}><div style={{fontWeight:500,fontSize:15}}>{s.name}</div></div>
              <div style={{display:'flex',gap:4}}>
                <button onClick={()=>openEditSrc(s)} style={{background:'none',border:'none',color:'var(--t2)',cursor:'pointer',fontSize:16,padding:4}}>✏️</button>
                <button onClick={()=>delSrc(s.id)} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:16,padding:4}}>🗑</button>
              </div>
            </div>
          ))}
          {sources.length===0&&<div className="empty"><div className="empty-icon">💳</div><div>No payment sources yet</div></div>}
        </div>
      )}

      {tab==='users'&&(
        <div className="section">
          <button className="btn" style={{marginBottom:16}} onClick={openAddUsr}>+ Register New User</button>
          {users.map(u=>(
            <div key={u.id} className="card" style={{display:'flex',alignItems:'center',gap:14,marginBottom:10}}>
              <div style={{width:44,height:44,borderRadius:'50%',background:'var(--bg3)',border:'.5px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{u.avatar}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:500,fontSize:15}}>{u.display_name}</div>
                <div style={{fontSize:12,color:'var(--t2)',marginTop:2}}>@{u.username}</div>
                {u.id===currentUser.id&&<div style={{fontSize:11,color:'var(--a)',marginTop:3}}>● You</div>}
              </div>
              <div style={{display:'flex',gap:4}}>
                <button onClick={()=>openEditUsrFn(u)} style={{background:'none',border:'none',color:'var(--t2)',cursor:'pointer',fontSize:16,padding:4}}>✏️</button>
                {u.id!==currentUser.id&&<button onClick={()=>delUsr(u.id)} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:16,padding:4}}>🗑</button>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── MODAL: Add Category ── */}
      {showGrp&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowGrp(false)}>
          <div className="modal">
            <div className="modal-body" style={{padding:'16px 18px 8px'}}>
              <div className="modal-handle"/>
              <div className="modal-title" style={{fontSize:17,marginBottom:14}}>{editGrp?'Edit Category':'New Category'}</div>
              <div className="fg" style={{marginBottom:12}}>
                <label className="fl">Name</label>
                <input className="fi" style={{padding:'10px 14px',fontSize:14}} placeholder="e.g. Groceries" value={gName} onChange={e=>setGName(e.target.value)}/>
              </div>
              <div className="fg" style={{marginBottom:12}}>
                <label className="fl">Emoji</label>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {EMOJIS.map(em=><div key={em} onClick={()=>setGEmoji(em)} style={{width:36,height:36,borderRadius:8,background:gEmoji===em?'var(--abg)':'var(--bg3)',border:`.5px solid ${gEmoji===em?'var(--a)':'var(--b1)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,cursor:'pointer'}}>{em}</div>)}
                </div>
              </div>
              <div className="fg" style={{marginBottom:12}}>
                <label className="fl">Color</label>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {COLORS.map(cl=><div key={cl} onClick={()=>setGColor(cl)} style={{width:28,height:28,borderRadius:'50%',background:cl,border:`2px solid ${gColor===cl?'white':'transparent'}`,cursor:'pointer'}}/>)}
                </div>
              </div>
              <div className="fg" style={{marginBottom:4}}>
                <label className="fl">Sub Categories</label>
                <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6,minHeight:6}}>
                  {gSubList.filter(s=>!s._del).map((s,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:3,background:'var(--bg3)',border:'.5px solid var(--b2)',borderRadius:20,padding:'3px 8px',fontSize:11}}>
                      <span>{s.name}</span>
                      <button onClick={()=>setGSubList(l=>l.map((x,j)=>j===i?{...x,_del:true}:x))} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:12,padding:'0 0 0 3px',lineHeight:1}}>x</button>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',gap:6}}>
                  <input className="fi" style={{padding:'9px 12px',fontSize:13}} placeholder="e.g. Lunch, Kopi..." value={gSubInput} onChange={e=>setGSubInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter'&&gSubInput.trim()){setGSubList(l=>[...l,{name:gSubInput.trim(),_new:true}]);setGSubInput('');}}}
                    style={{flex:1,padding:'9px 12px',fontSize:13}}/>
                  <button onClick={()=>{if(gSubInput.trim()){setGSubList(l=>[...l,{name:gSubInput.trim(),_new:true}]);setGSubInput('');}}}
                    className="btn" style={{width:40,height:40,padding:0,fontSize:20,flexShrink:0,borderRadius:10}}>+</button>
                </div>
                <div style={{fontSize:10,color:'var(--t3)',marginTop:3}}>Press Enter or + to add</div>
              </div>
            </div>
            <div className="modal-foot" style={{padding:'10px 18px 14px'}}>
              <div className="btn-row">
                <button className="btn ghost" style={{padding:11,fontSize:13}} onClick={()=>setShowGrp(false)}>Cancel</button>
                <button className="btn" style={{padding:11,fontSize:13}} onClick={addGrp} disabled={saving}>{saving?'Saving...':editGrp?'Update':'Add'}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      
      {/* ── MODAL: Set Budget ── */}
      {showBud&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowBud(false)}>
          <div className="modal">
            <div className="modal-body">
              <div className="modal-handle"/>
              <div className="modal-title">{editBud?'Edit Budget':'Set Budget'}</div>
              <div className="fg"><label className="fl">Category</label>
                <select className="fi" value={bGid} onChange={e=>{setBGid(e.target.value);setBSubId('');}}>
                  {groups.map(g=><option key={g.id} value={g.id}>{g.emoji} {g.name}</option>)}
                </select>
              </div>
              {subCats.filter(s=>s.group_id===bGid).length>0&&(
                <div className="fg"><label className="fl">Sub Category <span style={{color:'var(--t3)',fontWeight:400}}>(opsional)</span></label>
                  <select className="fi" value={bSubId} onChange={e=>setBSubId(e.target.value)}>
                    <option value="">-- Semua sub category --</option>
                    {subCats.filter(s=>s.group_id===bGid).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </div>
              )}
              <div className="fg"><label className="fl">Amount (IDR)</label>
                <input className="fi" inputMode="numeric" placeholder="e.g. 1.500.000"
                  value={bAmt?parseInt(bAmt.replace(/\./g,'').replace(/[^0-9]/g,'')||'0').toLocaleString('id-ID'):''}
                  onChange={e=>setBAmt(e.target.value.replace(/\./g,'').replace(/[^0-9]/g,''))}/>
              </div>
              <div className="fg">
                <label className="fl">Type</label>
                <div style={{display:'flex',gap:8}}>
                  {['weekly','monthly'].map(tp=><button key={tp} onClick={()=>setBType(tp)} className={`btn ${bType===tp?'':'ghost'}`} style={{flex:1,padding:10,fontSize:13}}>{tp==='weekly'?'📅 Weekly':'📆 Monthly'}</button>)}
                </div>
              </div>
              <div className="fg">
                <label className="fl">Period</label>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input className="fi" type="date" value={bFrom} onChange={e=>setBFrom(e.target.value)} style={{flex:1,padding:'10px 10px',fontSize:13}}/>
                  <span style={{color:'var(--t3)',fontSize:12,flexShrink:0}}>-</span>
                  <input className="fi" type="date" value={bTo} onChange={e=>setBTo(e.target.value)} style={{flex:1,padding:'10px 10px',fontSize:13}}/>
                </div>
              </div>
            </div>
            <div className="modal-foot">
              <div className="btn-row">
                <button className="btn ghost" onClick={()=>{setShowBud(false);setEditBud(null)}}>Cancel</button>
                <button className="btn" onClick={saveBud} disabled={saving}>{saving?'Saving...':'💾 Save'}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── MODAL: Register User ── */}
      {showUsr&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowUsr(false)}>
          <div className="modal">
            <div className="modal-body">
              <div className="modal-handle"/>
              <div className="modal-title">{editUsr?'Edit User':'Register User'}</div>
              {uErr&&<div style={{background:'var(--redbg)',border:'.5px solid rgba(255,77,77,.2)',borderRadius:10,padding:'10px 14px',fontSize:13,color:'var(--red)',marginBottom:16}}>⚠️ {uErr}</div>}
              <div className="fg"><label className="fl">Display Name</label><input className="fi" placeholder="e.g. Thaariq" value={uDisp} onChange={e=>setUDisp(e.target.value)}/></div>
              {!editUsr&&<div className="fg"><label className="fl">Username</label><input className="fi" placeholder="e.g. thaariq" value={uName} onChange={e=>setUName(e.target.value.toLowerCase().replace(/\s/g,''))}/></div>}
